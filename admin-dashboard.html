<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a1628">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="İskele">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icon-192.png">
    <title>Müdür Paneli - Rumeli İskelesi</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap');

        :root {
            --bg: #0a1628;
            --card: #111d32;
            --input: #162340;
            --brd: #1e3a5f;
            --txt: #e8edf5;
            --txt2: #7a8ba8;
            --txt3: #4a5d7a;
            --acc: #3b82f6;
            --glow: rgba(59, 130, 246, .12);
            --green: #22c55e;
            --red: #ef4444;
            --orange: #f59e0b;
            --purple: #8b5cf6;
            --pink: #ec4899;
            --cyan: #06b6d4;
        }

        html {
            overflow-x: hidden;
            width: 100%;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        button, a, input, select, [role="button"] {
            touch-action: manipulation;
        }

        /* iOS 16px altı inputlarda otomatik zoom yapar — engelle */
        input, select, textarea {
            font-size: 16px !important;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--txt);
            min-height: 100vh;
            overflow-x: hidden;
            max-width: 100vw;
            -webkit-text-size-adjust: 100%;
        }

        ::-webkit-scrollbar {
            width: 6px
        }

        ::-webkit-scrollbar-track {
            background: var(--bg)
        }

        ::-webkit-scrollbar-thumb {
            background: var(--brd);
            border-radius: 3px
        }

        /* NAV */
        .nav {
            background: var(--card);
            border-bottom: 1px solid var(--brd);
            padding: 14px 20px;
            position: sticky;
            top: 0;
            z-index: 100
        }

        .nav-in {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }

        .nbrand {
            display: flex;
            align-items: center;
            gap: 10px
        }

        .nicon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, #1e40af, #3b82f6);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px
        }

        .ntitle {
            font-weight: 700;
            font-size: 16px
        }

        .nsub {
            font-size: 11px;
            color: var(--txt2)
        }

        .nb {
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            border: 1px solid var(--brd);
            background: var(--input);
            color: var(--txt);
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: all .2s
        }

        .nb:hover {
            border-color: var(--acc);
            background: var(--glow)
        }

        .main {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px 16px 80px
        }

        /* HERO */
        .hero {
            border-radius: 18px;
            padding: 32px;
            margin-bottom: 24px;
            text-align: center;
            position: relative;
            overflow: hidden
        }

        .hero.gold {
            background: linear-gradient(135deg, #78350f, #b45309, #f59e0b)
        }

        .hero.blue {
            background: linear-gradient(135deg, #1e3a8a, #2563eb, #60a5fa)
        }

        .hero-badge {
            display: inline-flex;
            background: rgba(0, 0, 0, .2);
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            color: rgba(255, 255, 255, .9);
            margin-bottom: 12px
        }

        .hero-name {
            font-size: 32px;
            font-weight: 800;
            color: #fff;
            margin-bottom: 6px
        }

        .hero-amt {
            font-family: 'JetBrains Mono', monospace;
            font-size: 42px;
            font-weight: 700;
            color: #fff
        }

        .hero-sub {
            font-size: 13px;
            color: rgba(255, 255, 255, .7);
            margin-top: 8px
        }

        /* SECTION TITLE */
        .section-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 32px;
        }

        .section-title:first-of-type {
            margin-top: 0;
        }

        /* KASİYER SIRALAMALARI */
        .rank-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 14px;
            margin-bottom: 24px
        }

        .rank-card {
            background: var(--card);
            border: 1px solid var(--brd);
            border-radius: 14px;
            padding: 18px;
            display: flex;
            align-items: center;
            gap: 14px;
            transition: all .2s
        }

        .rank-card:hover {
            border-color: var(--acc);
            transform: translateY(-2px)
        }

        .rank-pos {
            font-size: 24px;
            font-weight: 800;
            width: 36px;
            text-align: center
        }

        .rank-pos.p1 {
            color: var(--orange)
        }

        .rank-pos.p2 {
            color: #94a3b8
        }

        .rank-pos.p3 {
            color: #b45309
        }

        .rank-pos.p4 {
            color: var(--txt3)
        }

        .rank-avatar {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: 700;
            color: #fff
        }

        .av-t {
            background: linear-gradient(135deg, #7c3aed, #8b5cf6)
        }

        .av-e {
            background: linear-gradient(135deg, #c2410c, #f59e0b)
        }

        .av-m {
            background: linear-gradient(135deg, #be185d, #ec4899)
        }

        .av-c {
            background: linear-gradient(135deg, #059669, #22c55e)
        }

        .rank-info {
            flex: 1
        }

        .rank-name {
            font-size: 14px;
            font-weight: 700
        }

        .rank-meta {
            font-size: 11px;
            color: var(--txt2);
            margin-top: 2px
        }

        .rank-right {
            text-align: right
        }

        .rank-pts {
            font-family: 'JetBrains Mono', monospace;
            font-size: 16px;
            font-weight: 700;
            color: var(--orange)
        }

        .rank-badge-pill {
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 6px;
            font-weight: 700;
            margin-top: 4px;
            display: inline-block;
            background: rgba(245, 158, 11, .15);
            color: var(--orange)
        }

        .badge-assign-btn {
            display: block;
            margin-top: 6px;
            padding: 4px 10px;
            font-size: 11px;
            font-weight: 600;
            border-radius: 6px;
            border: 1px solid var(--brd);
            background: var(--bg);
            color: var(--txt2);
            cursor: pointer;
            transition: all .2s;
        }
        .badge-assign-btn:hover { border-color: var(--orange); color: var(--orange); }

        /* ROZET ATAMA MODALI */
        .badge-modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(5,10,20,.85);
            backdrop-filter: blur(4px);
            z-index: 5000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            animation: fadeIn .25s;
        }
        .badge-modal-box {
            background: var(--card);
            border: 1px solid var(--brd);
            border-radius: 16px;
            max-width: 520px;
            width: 100%;
            box-shadow: 0 25px 80px rgba(0,0,0,.6);
            overflow: hidden;
        }
        .badge-modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 22px;
            border-bottom: 1px solid var(--brd);
        }
        .badge-modal-header h3 { margin: 0; font-size: 17px; font-weight: 700; }
        .badge-option-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            padding: 20px 22px;
        }
        .badge-option {
            padding: 14px 10px;
            border: 2px solid var(--brd);
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            transition: all .2s;
        }
        .badge-option:hover { border-color: var(--orange); background: rgba(245,158,11,.08); }
        .badge-option.selected { border-color: var(--orange); background: rgba(245,158,11,.15); }
        .badge-option .badge-icon { font-size: 28px; margin-bottom: 6px; }
        .badge-option .badge-name { font-size: 11px; font-weight: 700; color: var(--txt); }
        .badge-option .badge-desc { font-size: 10px; color: var(--txt2); margin-top: 2px; }
        .badge-modal-actions {
            display: flex;
            gap: 10px;
            padding: 16px 22px;
            border-top: 1px solid var(--brd);
        }
        .badge-modal-actions button {
            flex: 1;
            padding: 11px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all .2s;
        }
        .badge-save-btn { background: var(--orange); color: #fff; }
        .badge-cancel-btn { background: var(--input); color: var(--txt); border: 1px solid var(--brd) !important; }

        /* KASA CİRO KARTLARI */
        .kasa-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 14px;
            margin-bottom: 24px
        }

        .kasa-card {
            background: var(--card);
            border: 1px solid var(--brd);
            border-radius: 14px;
            padding: 20px;
            position: relative;
            overflow: hidden;
            transition: all .2s
        }

        .kasa-card:hover {
            border-color: var(--acc);
            transform: translateY(-2px)
        }

        .kasa-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            border-radius: 14px 14px 0 0
        }

        .kasa-card.restoran::before {
            background: linear-gradient(90deg, #3b82f6, #60a5fa)
        }

        .kasa-card.cafetarya::before {
            background: linear-gradient(90deg, #8b5cf6, #a78bfa)
        }

        .kasa-card.balik::before {
            background: linear-gradient(90deg, #06b6d4, #22d3ee)
        }

        .kasa-card.dondurma::before {
            background: linear-gradient(90deg, #ec4899, #f9a8d4)
        }

        .kasa-icon {
            font-size: 28px;
            margin-bottom: 10px
        }

        .kasa-label {
            font-size: 12px;
            color: var(--txt2);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: .5px;
            margin-bottom: 6px
        }

        .kasa-amount {
            font-family: 'JetBrains Mono', monospace;
            font-size: 22px;
            font-weight: 700;
            color: var(--txt);
            margin-bottom: 4px
        }

        .kasa-sub {
            font-size: 11px;
            color: var(--txt3)
        }

        .kasa-percent {
            font-size: 12px;
            font-weight: 700;
            margin-top: 6px
        }

        .kasa-percent.up {
            color: var(--green)
        }

        .kasa-percent.down {
            color: var(--red)
        }

        /* ÖZET KARTLAR */
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 14px;
            margin-bottom: 24px
        }

        .sc {
            border-radius: 14px;
            padding: 20px;
            color: #fff;
            position: relative;
            overflow: hidden
        }

        .sc::after {
            content: '';
            position: absolute;
            top: -20px;
            right: -20px;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: rgba(255, 255, 255, .08)
        }

        .sc.blue {
            background: linear-gradient(135deg, #1e40af, #3b82f6)
        }

        .sc.purple {
            background: linear-gradient(135deg, #6d28d9, #8b5cf6)
        }

        .sc.orange {
            background: linear-gradient(135deg, #c2410c, #f59e0b)
        }

        .sc.green {
            background: linear-gradient(135deg, #065f46, #22c55e)
        }

        .sc-l {
            font-size: 12px;
            opacity: .8;
            margin-bottom: 6px;
            font-weight: 500
        }

        .sc-v {
            font-family: 'JetBrains Mono', monospace;
            font-size: 24px;
            font-weight: 700
        }

        .sc-s {
            font-size: 11px;
            opacity: .65;
            margin-top: 4px
        }

        /* GRAFİKLER */
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            margin-bottom: 24px
        }

        .chart-card {
            background: var(--card);
            border: 1px solid var(--brd);
            border-radius: 14px;
            padding: 22px
        }

        .chart-title {
            font-size: 15px;
            font-weight: 700;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px
        }

        .chart-wrap {
            position: relative;
            height: 280px
        }

        /* FİLTRE BAR */
        .filter-bar {
            background: var(--card);
            border: 1px solid var(--brd);
            border-radius: 14px;
            padding: 18px 22px;
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px
        }

        .filter-controls {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap
        }

        .fsel {
            background: var(--input);
            border: 1px solid var(--brd);
            color: var(--txt);
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            outline: none;
            cursor: pointer
        }

        .finput {
            background: var(--input);
            border: 1px solid var(--brd);
            color: var(--txt);
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            outline: none
        }

        .fbtn {
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            border: 1px solid var(--acc);
            background: var(--glow);
            color: var(--acc);
            cursor: pointer
        }

        /* UYARILAR */
        .alerts-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 14px;
            margin-bottom: 24px
        }

        .alert-card {
            background: var(--card);
            border-radius: 14px;
            padding: 18px
        }

        .alert-card.warning {
            border: 1px solid #92400e;
            background: rgba(146, 64, 14, .1)
        }

        .alert-card.danger {
            border: 1px solid #991b1b;
            background: rgba(153, 27, 27, .1)
        }

        .alert-card.ok {
            border: 1px solid #065f46;
            background: rgba(6, 95, 70, .1)
        }

        .alert-title {
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px
        }

        .alert-item {
            font-size: 13px;
            color: var(--txt2);
            padding: 6px 0;
            border-bottom: 1px solid var(--brd);
            display: flex;
            justify-content: space-between
        }

        .alert-item:last-child {
            border-bottom: none
        }

        /* TABLO */
        .table-card {
            background: var(--card);
            border: 1px solid var(--brd);
            border-radius: 14px;
            padding: 22px;
            overflow: hidden;
            margin-bottom: 24px
        }

        .table-title {
            font-size: 15px;
            font-weight: 700;
            margin-bottom: 14px
        }

        .table-wrap {
            overflow-x: auto
        }

        table {
            width: 100%;
            border-collapse: collapse
        }

        thead {
            background: var(--input)
        }

        th {
            padding: 12px 14px;
            text-align: left;
            font-size: 11px;
            font-weight: 600;
            color: var(--txt2);
            text-transform: uppercase;
            letter-spacing: .5px;
            white-space: nowrap
        }

        th.r,
        td.r {
            text-align: right
        }

        td {
            padding: 12px 14px;
            font-size: 13px;
            border-bottom: 1px solid rgba(30, 58, 95, .5);
            white-space: nowrap
        }

        tr:last-child td {
            border-bottom: none
        }

        tr:hover td {
            background: rgba(59, 130, 246, .04)
        }

        .badge {
            font-size: 10px;
            padding: 3px 8px;
            border-radius: 6px;
            font-weight: 700
        }

        .badge.on-time {
            background: rgba(34, 197, 94, .15);
            color: #22c55e
        }

        .badge.late {
            background: rgba(239, 68, 68, .15);
            color: #ef4444
        }

        .badge.sabah {
            background: rgba(59, 130, 246, .15);
            color: #60a5fa
        }

        .badge.aksam {
            background: rgba(139, 92, 246, .15);
            color: #a78bfa
        }

        .badge.ana_kasa {
            background: rgba(59, 130, 246, .15);
            color: #60a5fa
        }

        .badge.iki_kasa {
            background: rgba(6, 182, 212, .15);
            color: #22d3ee
        }

        .badge.tek_kasa {
            background: rgba(34, 197, 94, .15);
            color: #4ade80
        }

        .badge.restoran {
            background: rgba(59, 130, 246, .15);
            color: #60a5fa
        }

        .badge.cafetarya {
            background: rgba(139, 92, 246, .15);
            color: #a78bfa
        }

        .mono {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 600
        }

        /* LOADING */
        .loading {
            text-align: center;
            padding: 60px;
            color: var(--txt2)
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--brd);
            border-top-color: var(--acc);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px
        }

        @keyframes spin {
            to {
                transform: rotate(360deg)
            }
        }

        @media(max-width:768px) {

            .kasa-grid,
            .summary-grid {
                grid-template-columns: repeat(2, 1fr)
            }

            .charts-grid,
            .alerts-grid {
                grid-template-columns: 1fr
            }

            .rank-grid {
                grid-template-columns: repeat(2, 1fr)
            }
        }

        /* YENİ GELİŞTİRMELER CSS */
        .total-hero-card {
            background: linear-gradient(135deg, #1e40af, #3b82f6, #60a5fa);
            border-radius: 20px;
            padding: 32px;
            margin-bottom: 24px;
            display: grid;
            grid-template-columns: 1.5fr 1fr;
            gap: 32px;
            color: #fff;
            position: relative;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(59, 130, 246, .4);
        }

        .total-hero-card::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -20%;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(255, 255, 255, .15), transparent 70%);
            border-radius: 50%;
        }

        .total-hero-left {
            position: relative;
            z-index: 1;
        }

        .total-hero-label {
            font-size: 14px;
            opacity: 0.85;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .total-hero-amount {
            font-family: 'JetBrains Mono', monospace;
            font-size: 48px;
            font-weight: 900;
            margin-bottom: 16px;
            text-shadow: 0 4px 20px rgba(0, 0, 0, .2);
        }

        .total-hero-breakdown {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }

        .breakdown-item {
            font-size: 14px;
            font-weight: 600;
            background: rgba(255, 255, 255, .2);
            padding: 6px 12px;
            border-radius: 8px;
            backdrop-filter: blur(10px);
        }

        .total-hero-right {
            position: relative;
            z-index: 1;
        }

        .target-section {
            background: rgba(255, 255, 255, .15);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid rgba(255, 255, 255, .2);
        }

        .target-label {
            font-size: 13px;
            opacity: 0.85;
            margin-bottom: 6px;
            font-weight: 600;
        }

        .target-amount {
            font-family: 'JetBrains Mono', monospace;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 16px;
        }

        .progress-bar-container {
            background: rgba(0, 0, 0, .2);
            border-radius: 12px;
            height: 16px;
            overflow: hidden;
            margin-bottom: 8px;
        }

        .progress-bar-fill {
            background: linear-gradient(90deg, #22c55e, #10b981);
            height: 100%;
            border-radius: 12px;
            transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);

            left: 10%;

    <script type="module">
        import { supabase } from './js/supabase-client.js'
        if (typeof window._adminLoadOk === 'function') window._adminLoadOk()

        // ═══════════════════════════════════════
        // GLOBAL DEĞİŞKENLER - TARİH FİLTRESİ
        // ═══════════════════════════════════════
        let currentDateRange = 'month'
        let customStartDate = null
        let customEndDate = null
        let selectedSingleDay = null

        // ═══════════════════════════════════════
        // VERİ ÇEKME FONKSİYONLARI
        // ═══════════════════════════════════════

        // toISOString() UTC'ye çevirdiği için UTC+3'te gece yarısı yanlış gün verir.
        // Bu fonksiyon tarayıcının yerel saatini kullanarak doğru tarih string'i üretir.
        function localDateStr(d) {
            return d.getFullYear() + '-' +
                String(d.getMonth() + 1).padStart(2, '0') + '-' +
                String(d.getDate()).padStart(2, '0')
        }

        async function fetchAllData() {
            let startDate
            let endDate = null

            const today = new Date()

            if (currentDateRange === 'day' && selectedSingleDay) {
                startDate = selectedSingleDay
                endDate = selectedSingleDay
            } else if (currentDateRange === 'custom' && customStartDate && customEndDate) {
                startDate = customStartDate
                endDate = customEndDate
            } else {
                switch (currentDateRange) {
                    case 'week':
                        const weekAgo = new Date()
                        weekAgo.setDate(weekAgo.getDate() - 7)
                        startDate = localDateStr(weekAgo)
                        break
                    case 'month':
                        startDate = localDateStr(new Date(today.getFullYear(), today.getMonth(), 1))
                        endDate   = localDateStr(new Date(today.getFullYear(), today.getMonth() + 1, 0))
                        break
                    case 'lastmonth':
                        startDate = localDateStr(new Date(today.getFullYear(), today.getMonth() - 1, 1))
                        endDate   = localDateStr(new Date(today.getFullYear(), today.getMonth(), 0))
                        break
                    case 'all':
                        startDate = '2020-01-01'
                        break
                    default:
                        startDate = localDateStr(new Date(today.getFullYear(), today.getMonth(), 1))
                        endDate   = localDateStr(new Date(today.getFullYear(), today.getMonth() + 1, 0))
                }
            }

            let reportsQuery = supabase
                .from('daily_reports')
                .select('*, cashiers(name)')
                .gte('date', startDate)
                .order('date', { ascending: false })

            if (endDate) {
                reportsQuery = reportsQuery.lte('date', endDate)
            }

            const [reportsRes, cashiersRes] = await Promise.all([
                reportsQuery,
                supabase.from('cashiers').select('*').order('total_points', { ascending: false })
            ])

            return {
                weekly: [],
                reports: reportsRes.data || [],
                cashiers: cashiersRes.data || []
            }
        }

        // ═══════════════════════════════════════
        // ANA HESAPLAMA FONKSİYONLARI
        // ═══════════════════════════════════════

        function calcKasaCiros(reports) {
            // ana_kasa / iki_kasa: her (tarih, kasa) çifti için akşam tercihli en iyi kaydı al
            // tek_kasa (eski): günde akşamı tercih et
            // restoran/cafetarya (çok eski): tümünü topla
            const newKasaDaily = {}   // key = `${date}-${kasa}` → en iyi kayıt
            const tekKasaDaily = {}   // key = date → en iyi kayıt
            let oldZ = 0, oldBalik = 0, oldDond = 0

            reports.forEach(r => {
                if (r.kasa === 'ana_kasa' || r.kasa === 'iki_kasa') {
                    const key = `${r.date}-${r.kasa}`
                    if (!newKasaDaily[key] || r.shift === 'aksam') newKasaDaily[key] = r
                } else if (r.kasa === 'tek_kasa') {
                    if (!tekKasaDaily[r.date] || r.shift === 'aksam') tekKasaDaily[r.date] = r
                } else {
                    // restoran: z2; cafetarya: z1
                    oldZ     += parseFloat(r.rumeli_z1 || 0) + parseFloat(r.rumeli_z2 || 0)
                    oldBalik += parseFloat(r.balik_ekmek || 0)
                    oldDond  += parseFloat(r.dondurma || 0)
                }
            })

            const sumNew = Object.values(newKasaDaily).reduce((acc, r) => {
                acc.z     += parseFloat(r.rumeli_z1 || 0)
                acc.balik += parseFloat(r.balik_ekmek || 0)
                acc.dond  += parseFloat(r.dondurma || 0)
                return acc
            }, { z: 0, balik: 0, dond: 0 })

            const sumTek = Object.values(tekKasaDaily).reduce((acc, r) => {
                acc.z     += parseFloat(r.rumeli_z1 || 0)
                acc.balik += parseFloat(r.balik_ekmek || 0)
                acc.dond  += parseFloat(r.dondurma || 0)
                return acc
            }, { z: 0, balik: 0, dond: 0 })

            const zRaporu  = sumNew.z     + sumTek.z     + oldZ
            const balik    = sumNew.balik + sumTek.balik + oldBalik
            const dondurma = sumNew.dond  + sumTek.dond  + oldDond
            return { zRaporu, balik, dondurma, total: zRaporu + balik + dondurma, restoran: 0, cafetarya: 0 }
        }

        // Adil liderboard: puan toplamı değil, performans oranı (%) bazlı sıralama
        function calcFairLeaderboard(reports, cashiers) {
            const map = {}
            cashiers.forEach(c => {
                map[c.id] = { cashier_id: c.id, name: c.name, badge_level: c.badge_level,
                    total_score: 0, entry_count: 0, on_time_count: 0 }
            })
            reports.forEach(r => {
                const id = r.cashier_id
                if (!map[id]) {
                    const name = r.cashiers?.name || 'Bilinmiyor'
                    map[id] = { cashier_id: id, name, badge_level: null,
                        total_score: 0, entry_count: 0, on_time_count: 0 }
                }
                // Her girişi 0-100 üzerinden normalize et (yeni sistem)
                const score = (r.is_on_time ? 50 : 0) +
                    (parseFloat(r.rumeli_z1 || 0) > 0 ||
                     parseFloat(r.total_revenue || 0) > 0 ? 50 : 0)
                map[id].total_score  += score
                map[id].entry_count  += 1
                if (r.is_on_time) map[id].on_time_count += 1
            })
            return Object.values(map).map(c => ({
                ...c,
                performance_pct: c.entry_count >= 1
                    ? Math.round((c.total_score / (c.entry_count * 100)) * 100)
                    : null
            })).sort((a, b) => {
                if (a.performance_pct === null && b.performance_pct === null) return 0
                if (a.performance_pct === null) return 1
                if (b.performance_pct === null) return -1
                if (b.performance_pct !== a.performance_pct)
                    return b.performance_pct - a.performance_pct
                return b.entry_count - a.entry_count
            })
        }

        function calcDailyCiros(reports) {
            // Her (tarih, kasa) çifti için akşam vardiyasını tercih et (yoksa sabah)
            // Akşam Z değeri gerçek günlük toplam; sabah X değerinden çıkarma yapılmaz
            const bestPerDateKasa = {}
            reports.forEach(r => {
                const key = `${r.date}-${r.kasa || 'x'}`
                if (!bestPerDateKasa[key] || r.shift === 'aksam') bestPerDateKasa[key] = r
            })

            const days = {}
            Object.values(bestPerDateKasa).forEach(r => {
                if (!days[r.date]) days[r.date] = 0
                days[r.date] += parseFloat(r.rumeli_z1 || 0) + parseFloat(r.rumeli_z2 || 0) +
                    parseFloat(r.balik_ekmek || 0) + parseFloat(r.dondurma || 0)
            })

            const sorted = Object.keys(days).sort()
            return {
                labels: sorted.map(d => formatDateShort(d)),
                data:   sorted.map(d => days[d])
            }
        }

        function calcShiftCiros(reports) {
            // Vardiya bazında individual_revenue kullan (toplam değil, sadece o vardiyaya ait gelir)
            const shifts = { sabah: 0, aksam: 0 }
            reports.forEach(r => {
                const revenue = parseFloat(r.individual_revenue || 0)
                if (r.shift === 'sabah') shifts.sabah += revenue
                else if (r.shift === 'aksam') shifts.aksam += revenue
            })
            return shifts
        }

        function calcCashierCiros(reports, cashiers) {
            // Kasiyer performansı için individual_revenue kullan
            const ciros = {}
            reports.forEach(r => {
                const name = r.cashiers?.name || 'Bilinmiyor'
                if (!ciros[name]) ciros[name] = 0
                ciros[name] += parseFloat(r.individual_revenue || 0)
            })
            return ciros
        }

        function calcAlerts(reports, cashiers) {
            const today = localDateStr(new Date())

            // Bugün giriş yapmayanlar
            const todayReports = reports.filter(r => r.date === today)
            const enteredToday = [...new Set(todayReports.map(r => r.cashier_id))]
            const notEntered = cashiers.filter(c => !enteredToday.includes(c.id))

            // Geç girişler (son 7 gün)
            const lateEntries = reports.filter(r => !r.is_on_time)

            // En yüksek günlük ciro
            const dailyCirosArr = calcDailyCiros(reports)
            const maxCiro = Math.max(...dailyCirosArr.data, 0)

            return { notEntered, lateEntries, maxCiro }
        }

        function calcDetailedStats(reports) {
            // En yüksek günlük ciro (her gün+kasa için sadece akşam/sabah al)
            const dailyCirosArr = calcDailyCiros(reports)
            const maxDailyCiro = Math.max(...dailyCirosArr.data, 0)

            // Aktif kasiyer (bugün giriş yapan)
            const today = localDateStr(new Date())
            const todayReports = reports.filter(r => r.date === today)
            const uniqueCashiers = [...new Set(todayReports.map(r => r.cashier_id))]
            const activeCashiers = uniqueCashiers.length

            // Ortalama işlem süresi (sabit veya hesaplanabilir)
            const avgEntryTime = "2.5dk"

            // Haftalık büyüme (simülasyon)
            const weeklyGrowth = "+12%"

            return { maxDailyCiro, activeCashiers, avgEntryTime, weeklyGrowth }
        }

        function getTodayType() {
            const today = new Date()
            const dayOfWeek = today.getDay() // 0=Pazar, 6=Cumartesi

            const specialDays = [
                '2026-01-01', // Yılbaşı
                '2026-04-23', // 23 Nisan
                '2026-05-01', // 1 Mayıs
                '2026-05-19', // 19 Mayıs
                '2026-08-30', // 30 Ağustos
                '2026-10-29', // 29 Ekim
            ]

            const todayStr = localDateStr(today)

            if (specialDays.includes(todayStr)) {
                return 'special'
            } else if (dayOfWeek === 0 || dayOfWeek === 6) {
                return 'weekend'
            } else {
                return 'weekday'
            }
        }

        async function fetchDailyTarget() {
            try {
                const targetType = getTodayType()
                console.log('Hedef tipi:', targetType)

                const { data, error } = await supabase
                    .from('targets')
                    .select('amount')
                    .eq('target_type', targetType)
                    .single()

                if (error) {
                    console.error('Hedef çekme hatası:', error)
                    const fallbacks = { weekday: 150000, weekend: 200000, special: 250000 }
                    return fallbacks[targetType]
                }

                console.log('Çekilen hedef:', data.amount)
                return parseFloat(data.amount) || 150000
            } catch (err) {
                console.error('fetchDailyTarget hatası:', err)
                return 150000
            }
        }

        // ═══════════════════════════════════════
        // ANİMASYON FONKSİYONLARI
        // ═══════════════════════════════════════

        function animateCards() {
            if (typeof anime === 'undefined') return
            anime({
                targets: '.kasa-card, .sc, .total-hero-card',
                opacity: [0, 1],
                translateY: [40, 0],
                delay: anime.stagger(100),
                duration: 800,
                easing: 'easeOutCubic'
            })

            anime({
                targets: '.rank-card',
                opacity: [0, 1],
                translateX: [-40, 0],
                delay: anime.stagger(120),
                duration: 700,
                easing: 'easeOutCubic'
            })
        }

        function animateNumbers() {
            if (typeof anime === 'undefined') return
            // Toplam ciro animasyonu
            const totalCiroEl = document.getElementById('totalDailyCiro')
            const targetValue = parseFloat(totalCiroEl.getAttribute('data-value') || 0)

            anime({
                targets: { value: 0 },
                value: targetValue,
                duration: 2000,
                easing: 'easeOutExpo',
                update: function (anim) {
                    totalCiroEl.textContent = formatCurrency(anim.animations[0].currentValue)
                }
            })

            // Progress bar animasyonu
            const fillEl = document.getElementById('progressBarFill')
            const percent = parseFloat(fillEl.getAttribute('data-percent') || 0)
            anime({
                targets: '#progressBarFill',
                width: percent + '%',
                duration: 1500,
                easing: 'easeInOutQuad'
            })
        }

        // ═══════════════════════════════════════
        // KATEGORİ SATIŞ FONKSİYONLARI
        // ═══════════════════════════════════════

        function calcCategorySales(reports) {
            const categories = {
                gida:         { name: 'Gıda',          icon: '🥗', total: 0, color: '#22c55e' },
                kahvalti:     { name: 'Kahvaltı',       icon: '🥐', total: 0, color: '#f59e0b' },
                kahve:        { name: 'Kahve',          icon: '☕', total: 0, color: '#8b5cf6' },
                meyvesuyu:    { name: 'Meyve Suyu',     icon: '🧃', total: 0, color: '#ec4899' },
                salata:       { name: 'Salata',         icon: '🥙', total: 0, color: '#06b6d4' },
                sicak_icecek:      { name: 'Sıcak İçecek',  icon: '🔥', total: 0, color: '#ef4444' },
                soguk_icecek:      { name: 'Soğuk İçecek',  icon: '🥤', total: 0, color: '#3b82f6' },
                tatli:             { name: 'Tatlı',          icon: '🍰', total: 0, color: '#a855f7' },
                dondurma_kategori: { name: 'Dondurma',       icon: '🍦', total: 0, color: '#06b6d4' }
            }

            // Her gün+kasa için sadece akşam vardiyasını al (çift sayım önleme)
            const dailyReports = {}
            reports.forEach(r => {
                const key = `${r.date}-${r.kasa}`
                if (!dailyReports[key] || r.shift === 'aksam') {
                    dailyReports[key] = r
                }
            })

            Object.values(dailyReports).forEach(r => {
                categories.gida.total         += parseFloat(r.gida)         || 0
                categories.kahvalti.total     += parseFloat(r.kahvalti)     || 0
                categories.kahve.total        += parseFloat(r.kahve)        || 0
                categories.meyvesuyu.total    += parseFloat(r.meyvesuyu)    || 0
                categories.salata.total       += parseFloat(r.salata)       || 0
                categories.sicak_icecek.total      += parseFloat(r.sicak_icecek)      || 0
                categories.soguk_icecek.total      += parseFloat(r.soguk_icecek)      || 0
                categories.tatli.total             += parseFloat(r.tatli)             || 0
                categories.dondurma_kategori.total += parseFloat(r.dondurma_kategori) || 0
            })

            const totalCategorySales = Object.values(categories).reduce((sum, c) => sum + c.total, 0)

            Object.values(categories).forEach(c => {
                c.percentage = totalCategorySales > 0 ? (c.total / totalCategorySales * 100) : 0
            })

            const sorted = Object.entries(categories)
                .map(([key, cat]) => ({ key, ...cat }))
                .sort((a, b) => b.total - a.total)

            return {
                categories: sorted,
                total:    totalCategorySales,
                highest:  sorted[0],
                lowest:   sorted[sorted.length - 1],
                average:  totalCategorySales / sorted.length
            }
        }

        function renderCategoryCards(categorySales) {
            return categorySales.categories.map(cat => `
                <div class="category-card">
                    <div class="category-header">
                        <span class="category-icon">${cat.icon}</span>
                        <span class="category-name">${cat.name}</span>
                    </div>
                    <div class="category-amount">${formatCurrency(cat.total)}</div>
                    <div class="category-stats">
                        <span class="category-percentage">${cat.percentage.toFixed(1)}% pay</span>
                    </div>
                </div>
            `).join('')
        }

        function renderCategoryBarChart(categorySales) {
            const maxValue = categorySales.categories[0]?.total || 1
            return categorySales.categories.map(cat => {
                const widthPercent = maxValue > 0 ? (cat.total / maxValue * 100) : 0
                return `
                    <div class="category-bar">
                        <div class="category-bar-label">${cat.icon} ${cat.name}</div>
                        <div class="category-bar-track">
                            <div class="category-bar-fill" style="width:${widthPercent}%;background:${cat.color};">
                                ${formatCurrencyShort(cat.total)}
                            </div>
                        </div>
                    </div>
                `
            }).join('')
        }

        function renderCategorySummary(categorySales) {
            return `
                <div class="category-summary-card">
                    <div class="summary-icon">🏆</div>
                    <div class="summary-label">En Çok Satan</div>
                    <div class="summary-value">${categorySales.highest.icon} ${categorySales.highest.name}</div>
                    <div style="font-size:12px;color:var(--acc);margin-top:4px;font-weight:600;">${formatCurrencyShort(categorySales.highest.total)}</div>
                </div>
                <div class="category-summary-card">
                    <div class="summary-icon">📉</div>
                    <div class="summary-label">En Az Satan</div>
                    <div class="summary-value">${categorySales.lowest.icon} ${categorySales.lowest.name}</div>
                    <div style="font-size:12px;color:var(--txt3);margin-top:4px;font-weight:600;">${formatCurrencyShort(categorySales.lowest.total)}</div>
                </div>
                <div class="category-summary-card">
                    <div class="summary-icon">📊</div>
                    <div class="summary-label">Kategori Ort.</div>
                    <div class="summary-value">${formatCurrencyShort(categorySales.average)}</div>
                    <div style="font-size:12px;color:var(--txt2);margin-top:4px;">Kategori başına</div>
                </div>
                <div class="category-summary-card">
                    <div class="summary-icon">💰</div>
                    <div class="summary-label">Kategori Toplamı</div>
                    <div class="summary-value">${formatCurrencyShort(categorySales.total)}</div>
                    <div style="font-size:12px;color:var(--txt2);margin-top:4px;">9 kategori</div>
                </div>
            `
        }

        // ═══════════════════════════════════════
        // RENDER FONKSİYONLARI
        // ═══════════════════════════════════════

        async function renderPage(weekly, reports, cashiers) {
            const dailyTarget   = await fetchDailyTarget()
            const kasaCiros     = calcKasaCiros(reports)
            const dailyCirosArr = calcDailyCiros(reports)
            const shiftCiros    = calcShiftCiros(reports)
            const cashierCiros  = calcCashierCiros(reports, cashiers)
            const alerts        = calcAlerts(reports, cashiers)
            const stats         = calcDetailedStats(reports)
            const categorySales = calcCategorySales(reports)

        let charts = {}

        function renderCharts(dailyCirosArr, kasaCiros, shiftCiros, cashierCiros) {
            // Ortak Chart.js ayarları
            Chart.defaults.color = '#7a8ba8'
            Chart.defaults.borderColor = '#1e3a5f'
            Chart.defaults.font.family = 'DM Sans'

            // 1. Günlük Ciro Trendi (Bar)
            const dailyCtx = document.getElementById('dailyChart')
            if (dailyCtx) {
                if (charts.daily) charts.daily.destroy()
                charts.daily = new Chart(dailyCtx, {
                    type: 'bar',
                    data: {
                        labels: dailyCirosArr.labels.length > 0 ? dailyCirosArr.labels : ['Veri Yok'],
                        datasets: [{
                            label: 'Günlük Ciro (₺)',
                            data: dailyCirosArr.data.length > 0 ? dailyCirosArr.data : [0],
                            backgroundColor: 'rgba(59,130,246,.7)',
                            borderColor: '#3b82f6',
                            borderWidth: 2,
                            borderRadius: 8,
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { legend: { display: false } },
                        scales: {
                            x: { grid: { color: '#1e3a5f' } },
                            y: {
                                grid: { color: '#1e3a5f' },
                                ticks: {
                                    callback: val => '₺' + new Intl.NumberFormat('tr-TR').format(val)
                                }
                            }
                        }
                    }
                })
            }

            // 2. Ürün Dağılımı (Doughnut)
            const kasaCtx = document.getElementById('kasaChart')
            if (kasaCtx) {
                if (charts.kasa) charts.kasa.destroy()

                const hasData     = kasaCiros.total > 0
                const displayData = hasData
                    ? [kasaCiros.zRaporu, kasaCiros.balik, kasaCiros.dondurma]
                    : [0.001, 0.001, 0.001]

                charts.kasa = new Chart(kasaCtx, {
                    type: 'doughnut',
                    data: {
                        labels: ['Rumeli İskelesi', 'Balık Ekmek', 'Dondurma'],
                        datasets: [{
                            data: displayData,
                            backgroundColor: [
                                'rgba(59,130,246,.8)',
                                'rgba(6,182,212,.8)',
                                'rgba(236,72,153,.8)',
                            ],
                            borderColor: '#111d32',
                            borderWidth: 3,
                            hoverOffset: 8,
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: { position: 'bottom', labels: { padding: 16, usePointStyle: true } },
                            tooltip: {
                                enabled: hasData,
                                callbacks: {
                                    label: ctx => {
                                        const val   = ctx.raw
                                        const total = ctx.dataset.data.reduce((a, b) => a + b, 0)
                                        const pct   = Math.round((val / total) * 100)
                                        return ` ${ctx.label}: ${formatCurrency(val)} (%${pct})`
                                    }
                                }
                            }
                        },
                        cutout: '65%',
                    }
                })
            }

            // 3. Vardiya Karşılaştırması (Bar)
            const shiftCtx = document.getElementById('shiftChart')
            if (shiftCtx) {
                if (charts.shift) charts.shift.destroy()
                charts.shift = new Chart(shiftCtx, {

        function formatCurrency(val) {
            return new Intl.NumberFormat('tr-TR', {
                minimumFractionDigits: 2,
                maximumFractionDigits: 2
            }).format(val || 0) + ' ₺'
        }

        function formatCurrencyShort(val) {
            return formatCurrency(val)
        }

        // ── KASA KARTLARI SAYAÇ ANİMASYONU ──────────────────────
        function animateKasaAmounts() {
            document.querySelectorAll('.kasa-amount[data-target]').forEach(el => {
                const target = parseFloat(el.dataset.target) || 0
                const duration = 1200
                const start = performance.now()
                function step(now) {
                    const p = Math.min((now - start) / duration, 1)
                    const ease = 1 - Math.pow(1 - p, 3)
                    el.textContent = formatCurrency(target * ease)
                    if (p < 1) requestAnimationFrame(step)
                    else el.textContent = formatCurrency(target)
                }
                requestAnimationFrame(step)
            })
        }

        // ── FLOATING TARGET CARD ─────────────────────────────────
        function updateFloatingTarget(target, current, pct) {
            const el = document.getElementById('floatingTarget')
            if (!el) return
            el.style.display = 'block'
            document.getElementById('ftPct').textContent  = pct + '%'
            document.getElementById('ftTarget').textContent  = formatCurrency(target)
            document.getElementById('ftCurrent').textContent = formatCurrency(current)
            const statusMap = [
                [100, '🎉 Hedef Tamamlandı!'],
                [80,  '💪 Hedefe Yakın!'],
                [50,  '⏰ Yarı Yolda!'],
                [0,   '🚀 Devam Edelim!']
            ]
            document.getElementById('ftStatus').textContent = (statusMap.find(([t]) => pct >= t) || statusMap[3])[1]
            const bar = document.getElementById('ftBar')
            bar.classList.toggle('done', pct >= 100)
            bar.classList.toggle('near', pct >= 80 && pct < 100)
            setTimeout(() => { bar.style.width = Math.min(100, pct) + '%' }, 200)
        }

        // ── OPERASYONEl VERİMLİLİK ───────────────────────────────
        window.showVerimlilik = async function() {
            document.getElementById('verimlilikModal').style.display = 'flex'
            const body = document.getElementById('verimlilikBody')
            body.innerHTML = '<div class="loading" style="padding:40px 0;"><div class="spinner"></div><div>Veriler hesaplanıyor...</div></div>'

            try {
                const now = new Date()
                const monthStart = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-01`
                const lastDay    = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate()
                const monthEnd   = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${lastDay}`

                const { data: rows } = await supabase
                    .from('daily_reports')
                    .select('date, kasa, shift, rumeli_z1, rumeli_z2, balik_ekmek, dondurma')
                    .in('kasa', ['restoran', 'cafetarya'])
                    .gte('date', monthStart)
                    .lte('date', monthEnd)
                    .order('date', { ascending: true })

                if (!rows || rows.length === 0) {
                    body.innerHTML = '<div style="text-align:center;padding:40px;color:var(--txt2);">Bu ay için veri bulunamadı.</div>'
                    return
                }

                // Kasa+gün bazında doğru satırı seç:
                //  - aksam, sabaha tercih edilir
                //  - İki aksam varsa (çift giriş), Z değeri yüksek olan seçilir
                //    (Z kümülatif olduğundan yüksek = gerçek gün sonu okuması)
                const kasaDayMap = {}
                rows.forEach(r => {
                    const key = `${r.date}-${r.kasa}`
                    if (!kasaDayMap[key]) {
                        kasaDayMap[key] = r
                    } else {
                        const cur = kasaDayMap[key]
                        const rZ   = r.kasa === 'restoran'   ? parseFloat(r.rumeli_z2)   : parseFloat(r.rumeli_z1)
                        const curZ = cur.kasa === 'restoran' ? parseFloat(cur.rumeli_z2) : parseFloat(cur.rumeli_z1)
                        // Aksam her zaman sabahın önüne geçer
                        if (cur.shift !== 'aksam' && r.shift === 'aksam') {
                            kasaDayMap[key] = r
                        } else if (cur.shift === 'aksam' && r.shift === 'aksam') {
                            // İki aksam satırı → en yüksek Z (gerçek gün sonu)
                            if (rZ > curZ) kasaDayMap[key] = r
                        }
                        // Yeni satır sabah, mevcut aksam → dokunma
                    }
                })

                // Günlük kasa bazlı toplamlar: restoran=z2, cafetarya=z1, balık+dondurma ayrı
                const dayMap = {}
                Object.values(kasaDayMap).forEach(r => {
                    if (!dayMap[r.date]) dayMap[r.date] = { restoran: 0, cafetarya: 0, balik: 0, dondurma: 0 }
                    if (r.kasa === 'restoran')       dayMap[r.date].restoran  = parseFloat(r.rumeli_z2) || 0
                    else if (r.kasa === 'cafetarya') dayMap[r.date].cafetarya = parseFloat(r.rumeli_z1) || 0
                    // Balık ekmek ve dondurma her kasadan ayrı topla
                    dayMap[r.date].balik    += parseFloat(r.balik_ekmek) || 0
                    dayMap[r.date].dondurma += parseFloat(r.dondurma)    || 0
                })

                // Günlük toplam (restoran + cafetarya + balık + dondurma)
                const dailyTotals = Object.entries(dayMap).map(([date, v]) => ({
                    date,
                    // Toplam = sadece Restoran + Cafetarya (balık ayrı panel)
                    total:     (v.restoran || 0) + (v.cafetarya || 0),
                    restoran:  v.restoran  || 0,
                    cafetarya: v.cafetarya || 0,
                    balik:     v.balik     || 0,
                    dondurma:  v.dondurma  || 0
                })).sort((a, b) => a.date.localeCompare(b.date))

                const grandTotal = dailyTotals.reduce((s, d) => s + d.total, 0)
                const dayCount   = dailyTotals.length
                const dailyAvgV  = dayCount > 0 ? grandTotal / dayCount : 0

                // En çok para yapılan gün (Restoran+Cafetarya bazlı)
                const maxDay = dailyTotals.reduce((m, d) => d.total > m.total ? d : m, dailyTotals[0])

                // Haftanın günlerine göre ortalama (Restoran+Cafetarya bazlı)
                const weekdayNames = ['Pazar', 'Pazartesi', 'Salı', 'Çarşamba', 'Perşembe', 'Cuma', 'Cumartesi']
                const weekdaySum = {}
                const weekdayCount = {}
                dailyTotals.forEach(d => {
                    const [dy, dm, dd] = d.date.split('-').map(Number)
                    const wd = new Date(dy, dm - 1, dd).getDay()
                    weekdaySum[wd]   = (weekdaySum[wd]   || 0) + d.total
                    weekdayCount[wd] = (weekdayCount[wd] || 0) + 1
                })

                // Balık ekmek günlük özeti (sadece veri olan günler)
                const balikDetay = dailyTotals.filter(d => d.balik > 0)
                const weekdayAvg = [0,1,2,3,4,5,6]
                    .filter(i => weekdayCount[i])
                    .map(i => ({ name: weekdayNames[i], avg: weekdaySum[i] / weekdayCount[i], idx: i }))
                    .sort((a, b) => b.avg - a.avg)

                const maxWdAvg = weekdayAvg.length > 0 ? weekdayAvg[0].avg : 1

                const monthLabel = now.toLocaleDateString('tr-TR', { month: 'long', year: 'numeric' })

                body.innerHTML = `
                    <div class="ver-stats-grid">
                        <div class="ver-stat-card">
                            <div class="ver-stat-label">🏢 Rumeli İskelesi Toplam</div>
                            <div class="ver-stat-value">${formatCurrency(grandTotal)}</div>
                            <div class="ver-stat-sub">${monthLabel}</div>
                        </div>
                        <div class="ver-stat-card">
                            <div class="ver-stat-label">📅 Veri Günü</div>
                            <div class="ver-stat-value">${dayCount} gün</div>
                            <div class="ver-stat-sub">Girişi olan günler</div>
                        </div>
                        <div class="ver-stat-card">
                            <div class="ver-stat-label">📊 Günlük Ortalama</div>
                            <div class="ver-stat-value">${formatCurrency(dailyAvgV)}</div>
                            <div class="ver-stat-sub">Restoran + Cafetarya ortalaması</div>
                        </div>
                        <div class="ver-stat-card" style="border-color:var(--orange);">
                            <div class="ver-stat-label">🏆 En İyi Gün</div>
                            <div class="ver-stat-value">${formatCurrency(maxDay?.total || 0)}</div>
                            <div class="ver-stat-sub">${maxDay ? (() => { const [my,mm,md] = maxDay.date.split('-').map(Number); return new Date(my,mm-1,md).toLocaleDateString('tr-TR', { day: 'numeric', month: 'long', weekday: 'short' }) })() : '-'}</div>
                        </div>
                    </div>

                    <div class="ver-section-title">📈 Haftanın En İyi Günleri (Ortalamaya Göre)</div>
                    <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:24px;">
                        ${weekdayAvg.map((w, i) => `
                            <div style="display:flex;align-items:center;gap:12px;">
                                <div style="width:20px;text-align:right;font-size:12px;color:var(--txt2);">${i+1}.</div>
                                <div style="width:90px;font-size:13px;font-weight:600;">${w.name}</div>
                                <div style="flex:1;height:8px;background:rgba(255,255,255,.06);border-radius:4px;overflow:hidden;">
                                    <div style="height:100%;width:${Math.round((w.avg / maxWdAvg) * 100)}%;background:linear-gradient(90deg,${i === 0 ? '#f59e0b,#f97316' : '#3b82f6,#06b6d4'});border-radius:4px;transition:width 1s ease;"></div>
                                </div>
                                <div style="width:130px;text-align:right;font-family:'JetBrains Mono',monospace;font-size:12px;color:${i === 0 ? 'var(--orange)' : 'var(--txt)'};">${formatCurrency(w.avg)}</div>
                            </div>
                        `).join('')}
                    </div>

                    <div class="ver-section-title">📋 Günlük Ciro Detayı — ${monthLabel}</div>
                    <div style="max-height:320px;overflow-y:auto;border-radius:10px;border:1px solid var(--brd);">
                        <table class="ver-daily-table">
                            <thead>
                                <tr>
                                    <th>Tarih</th>
                                    <th>Gün</th>
                                    <th>Restoran</th>
                                    <th>Cafetarya</th>
                                    <th>Toplam</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${dailyTotals.map(d => {
                                    const isMax = d.date === maxDay?.date
                                    const [_y,_m,_d] = d.date.split('-').map(Number)
                                    const dayName = new Date(_y,_m-1,_d).toLocaleDateString('tr-TR', { weekday: 'short' })
                                    return `<tr${isMax ? ' class="top-row"' : ''}>
                                        <td>${String(_d).padStart(2,'0')+'/'+String(_m).padStart(2,'0')}</td>
                                        <td style="color:var(--txt2);font-family:sans-serif;font-size:12px;">${dayName}</td>
                                        <td>${formatCurrency(d.restoran)}</td>
                                        <td>${formatCurrency(d.cafetarya)}</td>
                                        <td style="font-weight:700;${isMax ? 'color:var(--orange);' : ''}">${formatCurrency(d.total)}</td>

                    ${balikDetay.length > 0 ? `
                    <div style="margin-top:16px;">

                            style="background:rgba(6,182,212,.12);border:1px solid rgba(6,182,212,.3);color:var(--cyan);padding:8px 16px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;width:100%;text-align:left;">

                                    <tr>
                                        <th>Tarih</th>

        function formatDateShort(dateStr) {
            if (!dateStr) return '-'
            // 'YYYY-MM-DD' string'ini UTC parse etmeden doğrudan böl
            const parts = dateStr.split('T')[0].split('-')
            if (parts.length === 3) return parts[2] + '.' + parts[1]
            return dateStr
        }

        function formatTime(dt) {
            if (!dt) return '-'
            return new Date(dt).toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit', timeZone: 'Europe/Istanbul' })
        }

        function getInitials(name) {
            if (!name) return '??'
            return name.split(' ').map(n => n[0]).join('')
        }

        function getAvatarClass(name) {
            if (!name) return 't'
            const first = name.split(' ')[0]
            const map = { 'Tuba': 't', 'Elif': 'e', 'Melda': 'm', 'Ceren': 'c' }
            return map[first] || 't'
        }
