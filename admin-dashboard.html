                    </div>
                    <div class="badge-modal-actions">
                        <button class="badge-cancel-btn" onclick="this.closest('.badge-modal-overlay').remove()">İptal</button>
                        <button class="badge-save-btn" onclick="saveBadgeAssignment('${cashierId}')">💾 Kaydet</button>
                    </div>
                </div>`
            document.body.appendChild(modal)
        }

        window.selectBadgeOption = function(el, key) {
            document.querySelectorAll('.badge-option').forEach(o => o.classList.remove('selected'))
            el.classList.add('selected')
            el.closest('.badge-modal-overlay').__selectedBadge = key
        }

        window.saveBadgeAssignment = async function(cashierId) {
            const modal = document.querySelector('.badge-modal-overlay')
            const badgeKey = modal?.__selectedBadge
            if (!badgeKey) { alert('Lütfen bir rozet seçin.'); return }

            try {
                let badgeLevel = badgeKey
                if (badgeKey === 'auto') {
                    // Puan bazlı rozeti yeniden hesapla
                    const { data: cashier } = await supabase.from('cashiers').select('total_points').eq('id', cashierId).single()
                    const pts = cashier?.total_points || 0
                    if (pts >= 600) badgeLevel = 'efsane_plus'
                    else if (pts >= 400) badgeLevel = 'efsane'
                    else if (pts >= 250) badgeLevel = 'elmas'
                    else if (pts >= 150) badgeLevel = 'altin'
                    else if (pts >= 75)  badgeLevel = 'gumus'
                    else if (pts >= 30)  badgeLevel = 'bronz'
                    else badgeLevel = 'yeni'
                }

                const { error } = await supabase
                    .from('cashiers')
                    .update({ badge_level: badgeLevel })
                    .eq('id', cashierId)

                if (error) throw error

                modal.remove()
                showToast(`✅ Rozet atandı: ${getBadgeLabel(badgeLevel)}`, 'success')
                await loadDashboard()
            } catch (err) {
                console.error('Rozet atama hatası:', err)
                alert('❌ Hata: ' + err.message)
            }
        }

        // ═══════════════════════════════════════
        // TARİH FİLTRESİ FONKSİYONLARI
        // ═══════════════════════════════════════

        window.toggleDetails = function () {
            const section = document.getElementById('detailedSection')
            const icon = document.getElementById('toggleIcon')
            const text = document.getElementById('toggleText')
            if (!section) return

            if (section.style.display === 'none') {
                section.style.display = 'block'
                icon.textContent = '🙈'
                text.textContent = 'Detaylı Verileri Gizle'
            } else {
                section.style.display = 'none'
                icon.textContent = '👁️'
                text.textContent = 'Detaylı Verileri Göster'
            }
        }

        window.setDateFilter = function (range) {
            currentDateRange = range
            customStartDate = null
            customEndDate = null

            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'))
            const activeBtn = document.querySelector(`[data-range="${range}"]`)
            if (activeBtn) activeBtn.classList.add('active')

            const now = new Date()
            const thisMonthLabel = now.toLocaleDateString('tr-TR', { month: 'long', year: 'numeric' })
            const lastMonthDate = new Date(now.getFullYear(), now.getMonth() - 1, 1)
            const lastMonthLabel = lastMonthDate.toLocaleDateString('tr-TR', { month: 'long', year: 'numeric' })

            const infoTexts = {
                week: 'Son 7 gün',
                month: `Bu Ay (${thisMonthLabel})`,
                lastmonth: `Geçen Ay (${lastMonthLabel})`,
                all: 'Tüm veriler'
            }
            const filterInfoEl = document.getElementById('filterInfo')
            if (filterInfoEl) filterInfoEl.textContent = infoTexts[range] || ''

            window.loadDashboard()
        }

        window.showDayPicker = function () {
            const modal = document.createElement('div')
            modal.className = 'custom-date-modal'
            modal.style.display = 'flex'
            modal.id = 'dayPickerModal'
            modal.innerHTML = `
                <div class="custom-date-box">
                    <div class="custom-date-header">
                        <h3>📅 Belirli Gün Seçin</h3>
                        <button onclick="document.getElementById('dayPickerModal').remove()" class="close-btn">✕</button>
                    </div>
                    <div class="custom-date-content">
                        <div class="date-input-group">
                            <label>Tarih Seçin</label>
                            <input type="date" id="singleDayPicker" max="${localDateStr(new Date())}" />
                        </div>
                        <div style="margin-top:12px;padding:12px;background:rgba(59,130,246,.1);border-radius:8px;font-size:13px;color:var(--txt2);">
                            💡 Yalnızca seçilen günün verileri gösterilir.
                        </div>
                    </div>
                    <div class="custom-date-actions">
                        <button onclick="document.getElementById('dayPickerModal').remove()" class="modal-btn cancel">
                            İptal
                        </button>
                        <button onclick="applyDayFilter()" class="modal-btn apply">
                            Göster
                        </button>
                    </div>
                </div>
            `
            document.body.appendChild(modal)
            document.getElementById('singleDayPicker').value =
                selectedSingleDay || localDateStr(new Date())
        }

        window.applyDayFilter = function () {
            const input = document.getElementById('singleDayPicker')
            const day = input?.value
            if (!day) { alert('⚠️ Lütfen bir tarih seçin!'); return }

            selectedSingleDay = day
            currentDateRange = 'day'
            customStartDate = null
            customEndDate = null

            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'))
            const btn = document.querySelector('[data-range="day"]')
            if (btn) btn.classList.add('active')

            const displayDate = new Date(day).toLocaleDateString('tr-TR', {
                day: 'numeric', month: 'long', year: 'numeric'
            })
            const infoEl = document.getElementById('filterInfo')
            if (infoEl) infoEl.textContent = displayDate

            const modal = document.getElementById('dayPickerModal')
            if (modal) modal.remove()

            window.loadDashboard()
        }

        window.showCustomDatePicker = function () {
            const modal = document.getElementById('customDateModal')
            const today = localDateStr(new Date())

            document.getElementById('customStartDate').max = today
            document.getElementById('customEndDate').max = today

            if (!customStartDate) {
                const weekAgo = new Date()
                weekAgo.setDate(weekAgo.getDate() - 7)
                document.getElementById('customStartDate').value = localDateStr(weekAgo)
            } else {
                document.getElementById('customStartDate').value = customStartDate
            }

            document.getElementById('customEndDate').value = customEndDate || today

            modal.style.display = 'flex'
        }

        window.closeCustomDatePicker = function () {
            document.getElementById('customDateModal').style.display = 'none'
        }

        window.applyCustomDateRange = function () {
            const startDate = document.getElementById('customStartDate').value
            const endDate = document.getElementById('customEndDate').value

            if (!startDate || !endDate) {
                alert('⚠️ Lütfen başlangıç ve bitiş tarihlerini seçin!')
                return
            }

            if (startDate > endDate) {
                alert('⚠️ Başlangıç tarihi bitiş tarihinden sonra olamaz!')
                return
            }

            customStartDate = startDate
            customEndDate = endDate
            currentDateRange = 'custom'

            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'))
            const activeBtn = document.querySelector('[data-range="custom"]')
            if (activeBtn) activeBtn.classList.add('active')

            const start = new Date(startDate).toLocaleDateString('tr-TR', { day: '2-digit', month: 'short' })
            const end = new Date(endDate).toLocaleDateString('tr-TR', { day: '2-digit', month: 'short' })
            const filterInfoEl = document.getElementById('filterInfo')
            if (filterInfoEl) filterInfoEl.textContent = `${start} - ${end}`

            window.closeCustomDatePicker()
            window.loadDashboard()
        }

        // ═══════════════════════════════════════
        // ANA YÜKLEME
        // ═══════════════════════════════════════
        window.loadDashboard = async function () {
            try {
                // Loading göster
                document.getElementById('mainContent').innerHTML = `
                    <div class="loading">
                        <div class="spinner"></div>
                        <div>Veriler yükleniyor...</div>
                    </div>
                `

                const { weekly, reports, cashiers } = await fetchAllData()
                allReports = reports
                await renderPage(weekly, reports, cashiers)
            } catch (err) {
                console.error('Dashboard yükleme hatası:', err)
                document.getElementById('mainContent').innerHTML = `
                <div class="loading">
                    <div style="font-size:48px;margin-bottom:16px;">❌</div>
                    <div style="font-size:18px;color:var(--red);">Veri yükleme hatası!</div>
                    <div style="color:var(--txt2);margin-top:8px;">${err.message}</div>
                    <button onclick="loadDashboard()" class="nb" style="margin-top:20px;">🔄 Tekrar Dene</button>
                </div>
            `
            }
        }

        // Sayfa yüklenince başlat
        window.loadDashboard()

        // Otomatik yenileme (5 dakika)
        setInterval(() => window.loadDashboard(), 5 * 60 * 1000)

        // ═══════════════════════════════════════
        // SİL/DÜZENLE FONKSİYONLARI
        // ═══════════════════════════════════════

        window.deleteEntry = async function (entryId) {
            console.log('deleteEntry çağrıldı:', entryId)
            // Confirm modal göster
            const modal = document.createElement('div')
            modal.className = 'modal-overlay'
            modal.innerHTML = `
                <div class="modal-box">
                    <div class="modal-title">🗑️ Kaydı Sil</div>
                    <div class="modal-content">
                        <p style="color:var(--txt2);">Bu kaydı silmek istediğinize emin misiniz?</p>
                        <p style="color:var(--red);margin-top:8px;font-size:13px;">⚠️ Bu işlem geri alınamaz!</p>
                    </div>
                    <div class="modal-actions">
                        <button class="modal-btn cancel" onclick="this.closest('.modal-overlay').remove()">
                            İptal
                        </button>
                        <button class="modal-btn confirm" onclick="confirmDelete('${entryId}')">
                            Sil
                        </button>
                    </div>
                </div>
            `
            document.body.appendChild(modal)
        }

        window.confirmDelete = async function (entryId) {
            const modal = document.querySelector('.modal-overlay')

            try {
                console.log('Siliniyor:', entryId)

                // Supabase'den sil
                const { data, error } = await supabase
                    .from('daily_reports')
                    .delete()
                    .eq('id', entryId)

                console.log('Delete response:', { data, error })

                if (error) {
                    throw new Error(error.message)
                }

                // Modal kapat
                if (modal) modal.remove()

                // Toast göster
                showToast('✅ Kayıt başarıyla silindi!', 'success')

                // Tabloyu HEMEN yenile
                await loadDashboard()

            } catch (err) {
                console.error('Silme hatası:', err)
                showToast('❌ Silme başarısız: ' + err.message, 'error')

                // Modal kapat (hata olsa bile)
                if (modal) modal.remove()
            }
        }

        window.editEntry = async function (entryId) {
            console.log('editEntry çağrıldı:', entryId)
            // Önce kaydı getir
            const { data: entry, error } = await supabase
                .from('daily_reports')
                .select('*')
                .eq('id', entryId)
                .single()

            if (error) {
                showToast('❌ Kayıt bulunamadı', 'error')
                return
            }

            // Düzenleme modalı
            const modal = document.createElement('div')
            modal.className = 'modal-overlay'
            const isCafe = entry.kasa === 'cafetarya'
            const isRest = entry.kasa === 'restoran'
            modal.innerHTML = `
                <div class="modal-box" style="max-width:600px;">
                    <div class="modal-title">✏️ Kaydı Düzenle</div>
                    <div class="modal-content">
                        <div style="display:grid;gap:12px;">
                            <div style="background:var(--input);border-radius:8px;padding:10px;font-size:12px;color:var(--txt2);">
                                📅 ${entry.date} · ${entry.kasa} · ${entry.shift === 'sabah' ? '🌅 Sabah' : '🌙 Akşam'}
                            </div>
                            ${isRest ? `
                            <div>
                                <label style="font-size:12px;color:var(--txt2);display:block;margin-bottom:4px;">🍽️ Rumeli Z2 (Restoran)</label>
                                <input type="number" id="editZ2" step="0.01" value="${parseFloat(entry.rumeli_z2 || 0)}"
                                    style="width:100%;padding:10px;border-radius:8px;border:1px solid var(--brd);background:var(--input);color:var(--txt);">
                            </div>` : ''}
                            ${isCafe ? `
                            <div>
                                <label style="font-size:12px;color:var(--txt2);display:block;margin-bottom:4px;">☕ Rumeli Z1 (Cafetarya)</label>
                                <input type="number" id="editZ1" step="0.01" value="${parseFloat(entry.rumeli_z1 || 0)}"
                                    style="width:100%;padding:10px;border-radius:8px;border:1px solid var(--brd);background:var(--input);color:var(--txt);">
                            </div>
                            <div>
                                <label style="font-size:12px;color:var(--txt2);display:block;margin-bottom:4px;">🐟 Balık Ekmek</label>
                                <input type="number" id="editBalik" step="0.01" value="${parseFloat(entry.balik_ekmek || 0)}"
                                    style="width:100%;padding:10px;border-radius:8px;border:1px solid var(--brd);background:var(--input);color:var(--txt);">
                            </div>
                            <div>
                                <label style="font-size:12px;color:var(--txt2);display:block;margin-bottom:4px;">🍦 Dondurma</label>
                                <input type="number" id="editDondurma" step="0.01" value="${parseFloat(entry.dondurma || 0)}"
                                    style="width:100%;padding:10px;border-radius:8px;border:1px solid var(--brd);background:var(--input);color:var(--txt);">
                            </div>` : ''}
                            <div>
                                <label style="font-size:12px;color:var(--txt2);display:block;margin-bottom:4px;">Puan</label>
                                <input type="number" id="editPuan" value="${entry.points_earned || 0}"
                                    style="width:100%;padding:10px;border-radius:8px;border:1px solid var(--brd);background:var(--input);color:var(--txt);">
                            </div>
                            <div>
                                <label style="font-size:12px;color:var(--txt2);display:block;margin-bottom:4px;">Durum</label>
                                <select id="editDurum" style="width:100%;padding:10px;border-radius:8px;border:1px solid var(--brd);background:var(--input);color:var(--txt);">
                                    <option value="true" ${entry.is_on_time ? 'selected' : ''}>✅ Zamanında</option>
                                    <option value="false" ${!entry.is_on_time ? 'selected' : ''}>⚠️ Geç</option>
                                </select>
                            </div>
                        </div>
                    </div>
                    <div class="modal-actions">
                        <button class="modal-btn cancel" onclick="this.closest('.modal-overlay').remove()">
                            İptal
                        </button>
                        <button class="modal-btn confirm" style="background:var(--acc);" onclick="confirmEdit('${entryId}', '${entry.kasa}')">
                            Kaydet
                        </button>
                    </div>
                </div>
            `
            document.body.appendChild(modal)
        }

        window.confirmEdit = async function (entryId, kasa) {
            const modal = document.querySelector('.modal-overlay')

            try {
                const newPuan  = parseInt(document.getElementById('editPuan').value) || 0
                const newDurum = document.getElementById('editDurum').value === 'true'

                // Kasa tipine göre Z değerlerini al
                const z1El     = document.getElementById('editZ1')
                const z2El     = document.getElementById('editZ2')
                const balikEl  = document.getElementById('editBalik')
                const dondEl   = document.getElementById('editDondurma')

                const newZ1    = z1El    ? (parseFloat(z1El.value)    || 0) : null
                const newZ2    = z2El    ? (parseFloat(z2El.value)    || 0) : null
                const newBalik = balikEl ? (parseFloat(balikEl.value) || 0) : null
                const newDond  = dondEl  ? (parseFloat(dondEl.value)  || 0) : null

                // total_revenue yeniden hesapla
                const newTotal = (newZ1 ?? 0) + (newZ2 ?? 0) + (newBalik ?? 0) + (newDond ?? 0)

                const updatePayload = {
                    points_earned: newPuan,
                    is_on_time: newDurum,
                    total_revenue: newTotal
                }
                if (newZ1    !== null) updatePayload.rumeli_z1    = newZ1
                if (newZ2    !== null) updatePayload.rumeli_z2    = newZ2
                if (newBalik !== null) updatePayload.balik_ekmek  = newBalik
                if (newDond  !== null) updatePayload.dondurma     = newDond

                console.log('Güncelleniyor:', { entryId, kasa, updatePayload })

                // 1. daily_reports'u güncelle
                const { error: reportError } = await supabase
                    .from('daily_reports')
                    .update(updatePayload)
                    .eq('id', entryId)

                if (reportError) throw reportError

                // 2. Kasiyer ID'sini al
                const { data: reportData } = await supabase
                    .from('daily_reports')
                    .select('cashier_id')
                    .eq('id', entryId)
                    .single()

                if (!reportData) throw new Error('Kayıt bulunamadı')

                // 3. Bu kasiyerin TÜM raporlarından toplam puanı hesapla
                const { data: allReportsRes } = await supabase
                    .from('daily_reports')
                    .select('points_earned')
                    .eq('cashier_id', reportData.cashier_id)

                const totalPoints = allReportsRes.reduce((sum, r) => sum + (parseInt(r.points_earned) || 0), 0)

                console.log('Toplam puan:', totalPoints)

                // 4. Rozet seviyesini belirle
                let badgeLevel = 'yeni'
                if (totalPoints >= 1000) badgeLevel = 'efsane'
                else if (totalPoints >= 500) badgeLevel = 'elmas'
                else if (totalPoints >= 300) badgeLevel = 'altin'
                else if (totalPoints >= 150) badgeLevel = 'gumus'
                else if (totalPoints >= 50) badgeLevel = 'bronz'

                // 5. cashiers tablosunu güncelle
                const { error: cashierError } = await supabase
                    .from('cashiers')
                    .update({
                        total_points: totalPoints,
                        badge_level: badgeLevel
                    })
                    .eq('id', reportData.cashier_id)

                if (cashierError) throw cashierError

                // Modal kapat
                if (modal) modal.remove()

                // Toast
                showToast('✅ Kayıt ve kasiyer puanı güncellendi!', 'success')

                // Dashboard yenile
                await loadDashboard()

            } catch (err) {
                console.error('Güncelleme hatası:', err)
                showToast('❌ Güncelleme başarısız: ' + err.message, 'error')
                if (modal) modal.remove()
            }
        }

        function showToast(message, type = 'success') {
            const toast = document.createElement('div')
            toast.style.cssText = `
                position:fixed;
                bottom:20px;
                right:20px;
                background:${type === 'success' ? 'var(--green)' : 'var(--red)'};
                color:#fff;
                padding:16px 20px;
                border-radius:12px;
                font-size:14px;
                font-weight:600;
                z-index:3000;
                box-shadow:0 8px 24px rgba(0,0,0,.3);
                animation:slideIn .3s;
            `
            toast.textContent = message
            document.body.appendChild(toast)

            setTimeout(() => {
                toast.style.animation = 'slideOut .3s'
                setTimeout(() => toast.remove(), 300)
            }, 3000)
        }
    </script>

</body>

</html>
