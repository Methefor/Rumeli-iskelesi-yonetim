<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rumeli İskelesi - Dashboard</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <meta name="theme-color" content="#0a1628">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap');
        :root{--bg:#0a1628;--card:#111d32;--input:#162340;--brd:#1e3a5f;--txt:#e8edf5;--txt2:#7a8ba8;--txt3:#4a5d7a;--acc:#3b82f6;--glow:rgba(59,130,246,.12);--green:#22c55e;--red:#ef4444;--orange:#f59e0b;--purple:#8b5cf6;--pink:#ec4899;--cyan:#06b6d4}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;-webkit-font-smoothing:antialiased}
        ::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--brd);border-radius:3px}

        .nav{background:var(--card);border-bottom:1px solid var(--brd);padding:14px 20px;position:sticky;top:0;z-index:100}
        .nav-in{max-width:1400px;margin:0 auto;display:flex;justify-content:space-between;align-items:center}
        .nbrand{display:flex;align-items:center;gap:10px}
        .nicon{width:36px;height:36px;background:linear-gradient(135deg,#1e40af,#3b82f6);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px}
        .ntitle{font-weight:700;font-size:16px}.nsub{font-size:11px;color:var(--txt2);text-transform:uppercase;letter-spacing:.5px}
        .nacts{display:flex;gap:8px}
        .nb{padding:8px 14px;border-radius:8px;font-size:13px;font-weight:600;border:1px solid var(--brd);background:var(--input);color:var(--txt);cursor:pointer;transition:all .2s;text-decoration:none;display:inline-flex;align-items:center;gap:6px}
        .nb:hover{border-color:var(--acc);background:var(--glow)}.nb.blue{background:var(--acc);border-color:var(--acc);color:#fff}

        .main{max-width:1400px;margin:0 auto;padding:24px 16px 80px}

        /* Hero - Haftanın Elemanı */
        .hero{border-radius:18px;padding:32px;margin-bottom:24px;text-align:center;position:relative;overflow:hidden}
        .hero.gold{background:linear-gradient(135deg,#78350f,#b45309,#f59e0b)}
        .hero.blue{background:linear-gradient(135deg,#1e3a8a,#2563eb,#60a5fa)}
        .hero::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(circle,rgba(255,255,255,.06) 0%,transparent 70%);pointer-events:none}
        .hero-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(0,0,0,.2);padding:6px 16px;border-radius:20px;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:rgba(255,255,255,.9);margin-bottom:12px}
        .hero-name{font-size:32px;font-weight:800;color:#fff;margin-bottom:6px;text-shadow:0 2px 10px rgba(0,0,0,.3)}
        .hero-stat{font-size:15px;color:rgba(255,255,255,.8);margin-bottom:4px}
        .hero-amt{font-family:'JetBrains Mono',monospace;font-size:42px;font-weight:700;color:#fff;text-shadow:0 2px 20px rgba(0,0,0,.3)}
        .hero-sub{font-size:13px;color:rgba(255,255,255,.6);margin-top:8px}

        /* Kasiyerler Sıralaması */
        .rank-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px;margin-bottom:24px}
        .rank-card{background:var(--card);border:1px solid var(--brd);border-radius:14px;padding:18px;display:flex;align-items:center;gap:14px;transition:transform .2s,border-color .2s}
        .rank-card:hover{transform:translateY(-2px);border-color:var(--acc)}
        .rank-pos{font-size:24px;font-weight:800;width:36px;text-align:center}
        .rank-pos.p1{color:var(--orange)}.rank-pos.p2{color:#94a3b8}.rank-pos.p3{color:#b45309}
        .rank-pos.p4,.rank-pos.p5{color:var(--txt3)}
        .rank-avatar{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#fff}
        .rank-info{flex:1}
        .rank-name{font-size:14px;font-weight:700}
        .rank-entries{font-size:11px;color:var(--txt2)}
        .rank-amt{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:700;text-align:right}
        .rank-badge{font-size:10px;padding:2px 8px;border-radius:6px;font-weight:700;margin-top:2px;display:inline-block}
        .badge-gold{background:rgba(245,158,11,.15);color:var(--orange)}
        .badge-star{background:rgba(139,92,246,.15);color:var(--purple)}
        .badge-fire{background:rgba(239,68,68,.15);color:var(--red)}
        .badge-ok{background:rgba(34,197,94,.15);color:var(--green)}

        /* Filter */
        .filter-bar{background:var(--card);border:1px solid var(--brd);border-radius:14px;padding:18px 22px;margin-bottom:24px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
        .filter-bar h2{font-size:22px;font-weight:700}
        .filter-bar .meta{font-size:13px;color:var(--txt2);margin-top:2px}
        .fr{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
        .fsel{background:var(--input);border:1px solid var(--brd);color:var(--txt);padding:8px 14px;border-radius:8px;font-size:14px;font-weight:600;outline:none}
        .del-btn{padding:8px 14px;border-radius:8px;font-size:13px;font-weight:600;background:#7f1d1d;color:#fca5a5;border:1px solid #991b1b;cursor:pointer;display:none}

        /* Stats */
        .sg{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
        .sc{border-radius:14px;padding:20px;color:#fff;position:relative;overflow:hidden}
        .sc::after{content:'';position:absolute;top:-20px;right:-20px;width:80px;height:80px;border-radius:50%;background:rgba(255,255,255,.08)}
        .sc.blue{background:linear-gradient(135deg,#1e40af,#3b82f6)}.sc.purple{background:linear-gradient(135deg,#6d28d9,#8b5cf6)}
        .sc.orange{background:linear-gradient(135deg,#c2410c,#f59e0b)}.sc.pink{background:linear-gradient(135deg,#be185d,#ec4899)}
        .sc-l{font-size:12px;opacity:.8;margin-bottom:6px;font-weight:500}
        .sc-v{font-family:'JetBrains Mono',monospace;font-size:26px;font-weight:700}
        .sc-s{font-size:11px;opacity:.65;margin-top:4px}

        /* Summary row */
        .sr{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
        .src{background:var(--card);border:1px solid var(--brd);border-radius:14px;padding:18px}
        .src-l{font-size:12px;color:var(--txt2);margin-bottom:6px}
        .src-v{font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:700}

        /* Charts */
        .cg{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin-bottom:24px}
        .cc{background:var(--card);border:1px solid var(--brd);border-radius:14px;padding:22px}
        .ct{font-size:15px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px}
        .cw{position:relative;height:280px}

        /* Table */
        .tc{background:var(--card);border:1px solid var(--brd);border-radius:14px;padding:22px;overflow:hidden;margin-bottom:24px}
        .tt{font-size:15px;font-weight:700;margin-bottom:14px}
        .ts{overflow-x:auto}
        table{width:100%;border-collapse:collapse}
        thead{background:var(--input)}
        th{padding:12px 14px;text-align:left;font-size:11px;font-weight:600;color:var(--txt2);text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
        th.r,td.r{text-align:right}
        td{padding:12px 14px;font-size:13px;border-bottom:1px solid var(--brd);white-space:nowrap}
        tr:hover td{background:rgba(59,130,246,.04)}
        .dc{font-weight:600;font-family:'JetBrains Mono',monospace;font-size:12px}
        .tc-v{font-weight:700;color:var(--acc);font-family:'JetBrains Mono',monospace}
        input[type="checkbox"]{width:16px;height:16px;cursor:pointer;accent-color:var(--acc)}

        .no-data{text-align:center;padding:60px 20px;color:var(--txt3)}
        .no-data-icon{font-size:48px;margin-bottom:12px}
        .no-data-text{font-size:16px;font-weight:600;color:var(--txt2);margin-bottom:4px}

        .toast{position:fixed;top:80px;left:50%;transform:translateX(-50%) translateY(-20px);padding:14px 24px;border-radius:12px;font-weight:600;font-size:14px;z-index:200;opacity:0;transition:all .3s;pointer-events:none}
        .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}.toast.success{background:#064e3b;color:#6ee7b7;border:1px solid #065f46}.toast.error{background:#7f1d1d;color:#fca5a5;border:1px solid #991b1b}

        .loading{display:flex;align-items:center;justify-content:center;padding:80px 20px;color:var(--txt2);flex-direction:column;gap:12px}
        @keyframes spin{to{transform:rotate(360deg)}}.spin{animation:spin 1s linear infinite;font-size:28px;display:inline-block}

        /* Kasiyer chip in table */
        .person-tag{display:inline-flex;align-items:center;gap:6px;font-weight:600;font-size:12px}
        .ptag-dot{width:8px;height:8px;border-radius:50%}

        @media(max-width:1024px){.sg{grid-template-columns:repeat(2,1fr)}.sr{grid-template-columns:repeat(2,1fr)}.cg{grid-template-columns:1fr}}
        @media(max-width:640px){.sg{grid-template-columns:1fr}.sr{grid-template-columns:1fr}.filter-bar{flex-direction:column;align-items:flex-start}.sc-v{font-size:22px}.hero-name{font-size:24px}.hero-amt{font-size:30px}.rank-grid{grid-template-columns:1fr}}
    </style>
</head>
<body>
    <nav class="nav"><div class="nav-in">
        <div class="nbrand"><div class="nicon">📊</div><div><div class="ntitle">Rumeli Yönetim</div><div class="nsub">Kasa Analiz Paneli</div></div></div>
        <div class="nacts"><a href="index.html" class="nb blue">➕ Veri Girişi</a><button class="nb" onclick="loadData()">🔄</button></div>
    </div></nav>
    <div id="toast" class="toast"></div>
    <main class="main" id="app"><div class="loading"><span class="spin">⏳</span><span>Veriler yükleniyor...</span></div></main>

<script>
const SB_URL='https://iwikwbjsznjuefvuemdb.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml3aWt3Ympzem5qdWVmdnVlbWRiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAyNzkwNzEsImV4cCI6MjA4NTg1NTA3MX0.JLTiyDsrzcyEQEf_yS0cwUwtR3H1FaPl4mRFBRk142Q';
const sb=window.supabase.createClient(SB_URL,SB_KEY);

const PP={
    metehan:{name:'Metehan Arslan',short:'Metehan',role:'Mesul Müdür',color:'#3b82f6',bg:'linear-gradient(135deg,#1e40af,#3b82f6)'},
    tuba:{name:'Tuba Bozaklı',short:'Tuba',role:'Kasiyer',color:'#8b5cf6',bg:'linear-gradient(135deg,#7c3aed,#8b5cf6)'},
    elif:{name:'Elif Yıldırım',short:'Elif',role:'Kasiyer',color:'#f59e0b',bg:'linear-gradient(135deg,#c2410c,#f59e0b)'},
    melda:{name:'Melda Yılmaz',short:'Melda',role:'Kasiyer',color:'#ec4899',bg:'linear-gradient(135deg,#be185d,#ec4899)'},
    ceren:{name:'Ceren Erdem',short:'Ceren',role:'Kasiyer',color:'#22c55e',bg:'linear-gradient(135deg,#059669,#22c55e)'}
};

let allRec=[],filtRec=[],selIds=new Set(),selMonth=new Date().toISOString().slice(0,7),charts={};

document.addEventListener('DOMContentLoaded',()=>loadData());

async function loadData(){
    document.getElementById('app').innerHTML='<div class="loading"><span class="spin">⏳</span><span>Veriler yükleniyor...</span></div>';
    try{
        const{data,error}=await sb.from('daily_revenue').select('*').order('date',{ascending:false});
        if(error)throw error;
        allRec=data||[];
    }catch(e){console.error(e);allRec=[]}
    selIds.clear();
    render();
}

function render(){
    filtRec=selMonth==='all'?[...allRec]:allRec.filter(r=>r.date.startsWith(selMonth));

    if(!allRec.length){
        document.getElementById('app').innerHTML=`<div class="no-data"><div class="no-data-icon">📭</div><div class="no-data-text">Henüz veri yok</div><a href="index.html" class="nb blue" style="margin-top:16px;display:inline-flex">➕ Veri Girişi</a></div>`;
        return;
    }

    const stats=calc(filtRec);
    const months=[...new Set(allRec.map(r=>r.date.slice(0,7)))].sort().reverse();
    const mNames=['Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'];
    let mTitle='Tüm Zamanlar',mYear='';
    if(selMonth!=='all'){const[y,m]=selMonth.split('-');mTitle=mNames[+m-1];mYear=y}

    // Haftanın elemanı hesapla
    const heroData=calcHero(filtRec);

    let html='';

    // HERO - Haftanın Elemanı
    if(heroData){
        html+=`<div class="hero gold" id="heroCard">
            <div class="hero-badge">🏆 ${heroData.title}</div>
            <div class="hero-name">${heroData.name}</div>
            <div class="hero-stat">${heroData.entries} gün veri girişi — ${heroData.role}</div>
            <div class="hero-amt">${fc(heroData.totalRevenue)}</div>
            <div class="hero-sub">${heroData.subtitle}</div>
        </div>`;
    }

    // Kasiyer Sıralaması
    const ranking=calcRanking(filtRec);
    if(ranking.length>0){
        html+='<div class="rank-grid">';
        ranking.forEach((r,i)=>{
            const p=PP[r.id]||{short:r.id,color:'#64748b',bg:'linear-gradient(135deg,#475569,#64748b)'};
            const posClass=i<3?`p${i+1}`:'p4';
            const medals=['🥇','🥈','🥉'];
            const posText=i<3?medals[i]:`${i+1}.`;
            let badge='';
            if(i===0)badge='<div class="rank-badge badge-gold">⭐ En Başarılı</div>';
            else if(r.avgRevenue>0&&ranking[0].avgRevenue>0&&r.avgRevenue/ranking[0].avgRevenue>.85)badge='<div class="rank-badge badge-star">💪 Güçlü Performans</div>';
            else if(r.entries>=5)badge='<div class="rank-badge badge-ok">✅ Düzenli</div>';
            
            html+=`<div class="rank-card">
                <div class="rank-pos ${posClass}">${posText}</div>
                <div class="rank-avatar" style="background:${p.bg}">${p.short.slice(0,2).toUpperCase()}</div>
                <div class="rank-info">
                    <div class="rank-name">${p.short}</div>
                    <div class="rank-entries">${r.entries} gün • Ort: ${fc(r.avgRevenue)}</div>
                    ${badge}
                </div>
                <div class="rank-amt">${fc(r.totalRevenue)}</div>
            </div>`;
        });
        html+='</div>';
    }

    // Filter
    html+=`<div class="filter-bar"><div>
        <h2>${mTitle} ${mYear}</h2>
        <div class="meta">📊 ${filtRec.length} kayıt</div>
    </div><div class="fr">
        <select class="fsel" onchange="chMonth(this.value)">
            <option value="all" ${selMonth==='all'?'selected':''}>📅 Tüm Aylar</option>
            ${months.map(m=>{const[y,mo]=m.split('-');return`<option value="${m}" ${selMonth===m?'selected':''}>${mNames[+mo-1]} ${y}</option>`}).join('')}
        </select>
        <button class="del-btn" id="delBtn" onclick="delSel()">🗑️ <span id="delCnt">0</span> Sil</button>
    </div></div>`;

    // Stats
    html+=`<div class="sg">
        <div class="sc blue"><div class="sc-l">Toplam Ciro</div><div class="sc-v">${fc(stats.total)}</div><div class="sc-s">Günlük Ort: ${fc(stats.avgDaily)}</div></div>
        <div class="sc purple"><div class="sc-l">Rumeli (Z1+Z2)</div><div class="sc-v">${fc(stats.rumeli)}</div><div class="sc-s">${stats.total?((stats.rumeli/stats.total)*100).toFixed(0):0}% oran</div></div>
        <div class="sc orange"><div class="sc-l">Balık Ekmek</div><div class="sc-v">${fc(stats.balik)}</div><div class="sc-s">${stats.total?((stats.balik/stats.total)*100).toFixed(0):0}% oran</div></div>
        <div class="sc pink"><div class="sc-l">Dondurma</div><div class="sc-v">${fc(stats.dondurma)}</div><div class="sc-s">${stats.total?((stats.dondurma/stats.total)*100).toFixed(0):0}% oran</div></div>
    </div>`;

    // Summary
    html+=`<div class="sr">
        <div class="src"><div class="src-l">Hafta İçi Toplam</div><div class="src-v">${fc(stats.wdTotal)}</div></div>
        <div class="src"><div class="src-l">Hafta İçi Ort.</div><div class="src-v">${fc(stats.wdAvg)}</div></div>
        <div class="src"><div class="src-l">Hafta Sonu Toplam</div><div class="src-v">${fc(stats.weTotal)}</div></div>
        <div class="src"><div class="src-l">Hafta Sonu Ort.</div><div class="src-v">${fc(stats.weAvg)}</div></div>
    </div>`;

    // Charts
    html+=`<div class="cg">
        <div class="cc"><div class="ct">📈 Günlük Ciro Trendi</div><div class="cw"><canvas id="ch1"></canvas></div></div>
        <div class="cc"><div class="ct">🥧 Kasa Dağılımı</div><div class="cw"><canvas id="ch2"></canvas></div></div>
        <div class="cc"><div class="ct">📊 Haftalık Performans</div><div class="cw"><canvas id="ch3"></canvas></div></div>
        <div class="cc"><div class="ct">💵 Kategori Gelirleri</div><div class="cw"><canvas id="ch4"></canvas></div></div>
    </div>
    <div class="cg">
        <div class="cc"><div class="ct">📅 Hafta İçi vs Hafta Sonu</div><div class="cw"><canvas id="ch5"></canvas></div></div>
        <div class="cc"><div class="ct">👤 Kasiyer Bazlı Ciro</div><div class="cw"><canvas id="ch6"></canvas></div></div>
    </div>`;

    // Table
    html+=`<div class="tc"><div class="tt">📋 Kayıt Detayları</div><div class="ts"><table>
        <thead><tr><th style="width:40px"><input type="checkbox" onchange="togAll(this.checked)"></th><th>Tarih</th><th>Gün</th><th>Kasiyer</th><th class="r">Toplam</th><th class="r">Z1</th><th class="r">Z2</th><th class="r">Balık</th><th class="r">Dondurma</th><th class="r">Hedef</th><th class="r">%</th></tr></thead>
        <tbody>${filtRec.map(r=>{
            const tot=+r.total_revenue||0,tgt=+r.daily_target||150000,pct=tgt?((tot/tgt)*100).toFixed(0):0;
            const d=new Date(r.date+'T00:00:00'),dn=['Paz','Pzt','Sal','Çar','Per','Cum','Cmt'][d.getDay()],isWe=d.getDay()===0||d.getDay()===6;
            const p=PP[r.created_by]||{short:r.created_by,color:'#64748b'};
            return`<tr>
                <td><input type="checkbox" value="${r.id}" onchange="togItem(${r.id},this.checked)" ${selIds.has(r.id)?'checked':''}></td>
                <td class="dc">${r.date.split('-').reverse().join('/')}</td>
                <td><span style="color:${isWe?'var(--orange)':'var(--txt2)'};font-weight:600;font-size:12px">${dn}</span></td>
                <td><span class="person-tag"><span class="ptag-dot" style="background:${p.color}"></span>${p.short}</span></td>
                <td class="r tc-v">${fc(tot)}</td>
                <td class="r">${fc(r.rumeli_z1)}</td><td class="r">${fc(r.rumeli_z2)}</td>
                <td class="r">${fc(r.balik_ekmek)}</td><td class="r">${fc(r.dondurma_z)}</td>
                <td class="r" style="color:var(--txt3)">${fc(tgt)}</td>
                <td class="r" style="color:${pct>=100?'var(--green)':pct>=80?'var(--orange)':'var(--red)'};font-weight:700;font-size:12px">%${pct}</td>
            </tr>`}).join('')}</tbody></table></div></div>`;

    document.getElementById('app').innerHTML=html;
    setTimeout(()=>renderCharts(stats),80);

    // Confetti for hero
    if(heroData)setTimeout(()=>{
        try{confetti({particleCount:120,spread:80,origin:{y:.3},colors:['#f59e0b','#fbbf24','#fde68a','#fff']});
        setTimeout(()=>confetti({particleCount:60,spread:50,origin:{y:.4,x:.3},colors:['#3b82f6','#8b5cf6']}),400);
        setTimeout(()=>confetti({particleCount:60,spread:50,origin:{y:.4,x:.7},colors:['#ec4899','#22c55e']}),700);
        }catch(e){}
    },300);
}

// HERO CALCULATION
function calcHero(recs){
    if(!recs.length)return null;
    
    // Son 7 günü al
    const now=new Date();
    const weekAgo=new Date(now);weekAgo.setDate(now.getDate()-7);
    const weekStr=weekAgo.toISOString().split('T')[0];
    
    const weekRecs=recs.filter(r=>r.date>=weekStr);
    if(!weekRecs.length){
        // Hiç haftalık veri yoksa tüm zamanı kullan
        const perPerson={};
        recs.forEach(r=>{
            if(!perPerson[r.created_by])perPerson[r.created_by]={total:0,entries:0};
            perPerson[r.created_by].total+=(+r.total_revenue||0);
            perPerson[r.created_by].entries++;
        });
        const sorted=Object.entries(perPerson).sort((a,b)=>b[1].total-a[1].total);
        if(!sorted.length)return null;
        const[id,d]=sorted[0];
        const p=PP[id]||{name:id,short:id,role:'Kasiyer'};
        return{name:p.name,role:p.role,entries:d.entries,totalRevenue:d.total,title:'Bu Dönemin Yıldızı ⭐',subtitle:'Toplam en yüksek ciro girişi'};
    }

    // Haftalık bazda en yüksek toplam ciro giren kasiyer
    const perPerson={};
    weekRecs.forEach(r=>{
        if(!perPerson[r.created_by])perPerson[r.created_by]={total:0,entries:0};
        perPerson[r.created_by].total+=(+r.total_revenue||0);
        perPerson[r.created_by].entries++;
    });
    const sorted=Object.entries(perPerson).sort((a,b)=>b[1].total-a[1].total);
    if(!sorted.length)return null;
    const[id,d]=sorted[0];
    const p=PP[id]||{name:id,short:id,role:'Kasiyer'};
    
    const titles=['🏆 Haftanın Yıldızı','🌟 Haftanın Elemanı','💫 Haftanın Şampiyonu','🔥 Haftanın En İyisi'];
    const title=titles[Math.floor(Math.random()*titles.length)];
    
    return{name:p.name,role:p.role,entries:d.entries,totalRevenue:d.total,title,subtitle:`Son 7 günde en yüksek ciro girişi yapan kasiyer`};
}

// RANKING
function calcRanking(recs){
    const perPerson={};
    recs.forEach(r=>{
        const id=r.created_by;
        if(!perPerson[id])perPerson[id]={id,totalRevenue:0,entries:0};
        perPerson[id].totalRevenue+=(+r.total_revenue||0);
        perPerson[id].entries++;
    });
    return Object.values(perPerson)
        .map(p=>({...p,avgRevenue:p.entries?p.totalRevenue/p.entries:0}))
        .sort((a,b)=>b.totalRevenue-a.totalRevenue);
}

// STATS
function calc(recs){
    let total=0,rumeli=0,balik=0,dondurma=0,z1=0,z2=0,wdTotal=0,weTotal=0,wdCnt=0,weCnt=0;
    let cg={gida:0,kahvalti:0,kahve:0,meyveSuyu:0,sicakIcecek:0,sogukIcecek:0,tatli:0,dondurmaSatis:0,depo:0};
    recs.forEach(r=>{
        const t=+r.total_revenue||0,rz1=+r.rumeli_z1||0,rz2=+r.rumeli_z2||0,be=+r.balik_ekmek||0,dn=+r.dondurma_z||0;
        total+=t;z1+=rz1;z2+=rz2;rumeli+=rz1+rz2;balik+=be;dondurma+=dn;
        const d=new Date(r.date+'T00:00:00').getDay();
        if(d===0||d===6){weTotal+=t;weCnt++}else{wdTotal+=t;wdCnt++}
        cg.gida+=+r.gida_gelir||0;cg.kahvalti+=+r.kahvalti_gelir||0;cg.kahve+=+r.kahve_gelir||0;
        cg.meyveSuyu+=+r.meyve_suyu_gelir||0;cg.sicakIcecek+=+r.sicak_icecek_gelir||0;
        cg.sogukIcecek+=+r.soguk_icecek_gelir||0;cg.tatli+=+r.tatli_gelir||0;
        cg.dondurmaSatis+=+r.dondurma_satis_gelir||0;cg.depo+=+r.depo_gelir||0;
    });
    const n=recs.length;
    return{total,rumeli,balik,dondurma,z1,z2,avgDaily:n?total/n:0,wdTotal,weTotal,wdAvg:wdCnt?wdTotal/wdCnt:0,weAvg:weCnt?weTotal/weCnt:0,wdCnt,weCnt,cg};
}

// CHARTS
function renderCharts(s){
    Object.values(charts).forEach(c=>{try{c.destroy()}catch(e){}});charts={};
    const tc='#94a3b8',gc='rgba(30,58,95,.5)';
    const opts={responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:tc,font:{family:'DM Sans',size:11}}}},scales:{x:{ticks:{color:tc,font:{size:10}},grid:{color:gc}},y:{ticks:{color:tc,font:{size:10},callback:v=>'₺'+(v/1000).toFixed(0)+'K'},grid:{color:gc}}}};

    // 1. Trend
    const sorted=[...filtRec].sort((a,b)=>a.date.localeCompare(b.date)).slice(-14);
    const el1=document.getElementById('ch1');
    if(el1&&sorted.length){
        // Aynı tarihteki kayıtları topla
        const byDate={};
        sorted.forEach(r=>{
            if(!byDate[r.date])byDate[r.date]={total:0,target:0};
            byDate[r.date].total+=(+r.total_revenue||0);
            byDate[r.date].target=+r.daily_target||150000;
        });
        const dates=Object.keys(byDate).sort();
        charts.c1=new Chart(el1,{type:'line',data:{
            labels:dates.map(d=>d.split('-').slice(1).reverse().join('/')),
            datasets:[{label:'Ciro',data:dates.map(d=>byDate[d].total),borderColor:'#3b82f6',backgroundColor:'rgba(59,130,246,.08)',fill:true,tension:.4,pointRadius:4,pointBackgroundColor:'#3b82f6',borderWidth:2.5},
            {label:'Hedef',data:dates.map(d=>byDate[d].target),borderColor:'rgba(239,68,68,.5)',borderDash:[6,4],pointRadius:0,borderWidth:1.5,fill:false}]
        },options:opts});
    }

    // 2. Kasa doughnut
    const el2=document.getElementById('ch2');
    if(el2)charts.c2=new Chart(el2,{type:'doughnut',data:{
        labels:['Z1','Z2','Balık','Dondurma'],datasets:[{data:[s.z1,s.z2,s.balik,s.dondurma],backgroundColor:['#3b82f6','#8b5cf6','#f59e0b','#ec4899'],borderWidth:0,hoverOffset:8}]
    },options:{responsive:true,maintainAspectRatio:false,cutout:'65%',plugins:{legend:{position:'bottom',labels:{color:tc,font:{family:'DM Sans',size:11},padding:16}}}}});

    // 3. Weekly
    const el3=document.getElementById('ch3');
    if(el3&&filtRec.length){
        const weeks={};
        [...filtRec].sort((a,b)=>a.date.localeCompare(b.date)).forEach(r=>{
            const d=new Date(r.date+'T00:00:00'),ws=new Date(d);ws.setDate(d.getDate()-d.getDay()+1);
            const k=ws.toISOString().split('T')[0];
            if(!weeks[k])weeks[k]=0;weeks[k]+=(+r.total_revenue||0);
        });
        const wk=Object.keys(weeks).sort().slice(-8);
        charts.c3=new Chart(el3,{type:'bar',data:{
            labels:wk.map(k=>new Date(k+'T00:00:00').toLocaleDateString('tr-TR',{day:'numeric',month:'short'})),
            datasets:[{label:'Haftalık',data:wk.map(k=>weeks[k]),backgroundColor:'rgba(59,130,246,.7)',borderRadius:6,borderSkipped:false}]
        },options:opts});
    }

    // 4. Category
    const el4=document.getElementById('ch4');
    if(el4){
        const cl=['Gıda','Kahvaltı','Kahve','M.Suyu','Sıcak İç.','Soğuk İç.','Tatlı','Dondurma','Depo'];
        const cd=[s.cg.gida,s.cg.kahvalti,s.cg.kahve,s.cg.meyveSuyu,s.cg.sicakIcecek,s.cg.sogukIcecek,s.cg.tatli,s.cg.dondurmaSatis,s.cg.depo];
        const cc=['#3b82f6','#8b5cf6','#f59e0b','#22c55e','#ef4444','#06b6d4','#ec4899','#a855f7','#64748b'];
        const filt=cl.map((l,i)=>({l,v:cd[i],c:cc[i]})).filter(x=>x.v>0);
        if(filt.length)charts.c4=new Chart(el4,{type:'bar',data:{
            labels:filt.map(f=>f.l),datasets:[{label:'Gelir',data:filt.map(f=>f.v),backgroundColor:filt.map(f=>f.c),borderRadius:6,borderSkipped:false}]
        },options:{...opts,indexAxis:'y',plugins:{legend:{display:false}}}});
    }

    // 5. Day type
    const el5=document.getElementById('ch5');
    if(el5)charts.c5=new Chart(el5,{type:'bar',data:{
        labels:['Hafta İçi','Hafta Sonu'],
        datasets:[{label:'Toplam',data:[s.wdTotal,s.weTotal],backgroundColor:['rgba(59,130,246,.7)','rgba(245,158,11,.7)'],borderRadius:6,borderSkipped:false},
        {label:'Günlük Ort.',data:[s.wdAvg,s.weAvg],backgroundColor:['rgba(59,130,246,.3)','rgba(245,158,11,.3)'],borderRadius:6,borderSkipped:false}]
    },options:opts});

    // 6. Person chart
    const el6=document.getElementById('ch6');
    if(el6){
        const ranking=calcRanking(filtRec);
        if(ranking.length)charts.c6=new Chart(el6,{type:'bar',data:{
            labels:ranking.map(r=>(PP[r.id]||{short:r.id}).short),
            datasets:[{label:'Toplam Ciro',data:ranking.map(r=>r.totalRevenue),backgroundColor:ranking.map(r=>(PP[r.id]||{color:'#64748b'}).color+'bb'),borderRadius:6,borderSkipped:false}]
        },options:opts});
    }
}

// INTERACTIONS
function chMonth(v){selMonth=v;selIds.clear();render()}
function togItem(id,c){if(c)selIds.add(id);else selIds.delete(id);updDel()}
function togAll(c){if(c)filtRec.forEach(r=>selIds.add(r.id));else selIds.clear();document.querySelectorAll('tbody input[type="checkbox"]').forEach(cb=>cb.checked=c);updDel()}
function updDel(){const b=document.getElementById('delBtn'),n=document.getElementById('delCnt');if(b&&n){b.style.display=selIds.size?'block':'none';n.textContent=selIds.size}}

async function delSel(){
    if(!selIds.size)return;
    if(!confirm(selIds.size+' kayıt silinecek. Emin misiniz?'))return;
    try{const ids=[...selIds];const{error}=await sb.from('daily_revenue').delete().in('id',ids);
    if(error)throw error;showToast('✅ '+ids.length+' kayıt silindi','success');selIds.clear();await loadData();}
    catch(e){showToast('❌ '+e.message,'error')}
}

function fc(v){return new Intl.NumberFormat('tr-TR',{style:'currency',currency:'TRY',maximumFractionDigits:0}).format(v||0)}
function showToast(m,t){const el=document.getElementById('toast');el.textContent=m;el.className='toast '+t+' show';setTimeout(()=>el.classList.remove('show'),4000)}
</script>
