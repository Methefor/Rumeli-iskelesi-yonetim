<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF8440"/>
      <stop offset="40%" stop-color="#0A4D68"/>
      <stop offset="100%" stop-color="#021525"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softblur">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>

  <!-- Arka plan: gün batımı rengi üstten, Marmara laciverti ortada, derin deniz altta -->
  <rect width="512" height="512" rx="90" fill="url(#sky)"/>

  <!-- Güneş (sağ üst, ufka batmış hali) -->
  <circle cx="372" cy="175" r="56" fill="#FFD060" opacity="0.78"/>
  <!-- Güneş hale yumuşatma -->
  <circle cx="372" cy="175" r="72" fill="#FFD060" opacity="0.12" filter="url(#softblur)"/>

  <!-- Deniz dolgu — ufuktan aşağısı -->
  <path d="M0,292 Q128,280 256,292 Q384,304 512,292 L512,512 L0,512 Z" fill="#021525"/>

  <!-- Dalga çizgileri -->
  <path d="M0,298 Q85,287 170,298 T340,298 T512,298" fill="none" stroke="rgba(255,255,255,0.42)" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M0,315 Q85,304 170,315 T340,315 T512,315" fill="none" stroke="rgba(255,255,255,0.22)" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M0,332 Q85,321 170,332 T340,332 T512,332" fill="none" stroke="rgba(255,255,255,0.11)" stroke-width="2" stroke-linecap="round"/>

  <!-- İskele bariyeri (korkuluk) -->
  <line x1="136" y1="268" x2="376" y2="268" stroke="#D4A840" stroke-width="4.5" stroke-linecap="round"/>
  <!-- Korkuluk dikmecikleri -->
  <rect x="136" y="263" width="7" height="24" rx="3" fill="#D4A840"/>
  <rect x="193" y="263" width="7" height="24" rx="3" fill="#D4A840"/>
  <rect x="253" y="263" width="7" height="24" rx="3" fill="#D4A840"/>
  <rect x="313" y="263" width="7" height="24" rx="3" fill="#D4A840"/>
  <rect x="370" y="263" width="7" height="24" rx="3" fill="#D4A840"/>

  <!-- İskele güverte (platform) -->
  <rect x="132" y="282" width="248" height="24" rx="7" fill="#C8902A"/>
  <!-- Tahta derzleri -->
  <line x1="164" y1="282" x2="164" y2="306" stroke="#9A6B12" stroke-width="2.5"/>
  <line x1="200" y1="282" x2="200" y2="306" stroke="#9A6B12" stroke-width="2.5"/>
  <line x1="256" y1="282" x2="256" y2="306" stroke="#9A6B12" stroke-width="2.5"/>
  <line x1="312" y1="282" x2="312" y2="306" stroke="#9A6B12" stroke-width="2.5"/>
  <line x1="348" y1="282" x2="348" y2="306" stroke="#9A6B12" stroke-width="2.5"/>

  <!-- İskele ayakları (suya inen) -->
  <rect x="160" y="306" width="16" height="112" rx="5" fill="#A07015"/>
  <rect x="336" y="306" width="16" height="112" rx="5" fill="#A07015"/>

  <!-- Orta direk / gönder -->
  <rect x="243" y="124" width="26" height="162" rx="7" fill="#D4A840"/>

  <!-- Fener ışığı halesi (arkada yumuşak) -->
  <circle cx="256" cy="148" r="40" fill="#FFF5CC" opacity="0.16" filter="url(#softblur)"/>

  <!-- Fener gövdesi -->
  <rect x="216" y="145" width="80" height="42" rx="11" fill="#B88228"/>
  <!-- Fener camı -->
  <rect x="222" y="151" width="68" height="30" rx="7" fill="#EEC850"/>
  <!-- Parlak ışık noktası -->
  <circle cx="256" cy="166" r="14" fill="white" opacity="0.94" filter="url(#glow)"/>
  <!-- Hafif dış parıltı -->
  <circle cx="256" cy="166" r="22" fill="white" opacity="0.14"/>

  <!-- Fener çatısı (üçgen) -->
  <polygon points="256,108 210,147 302,147" fill="#C49030"/>
  <!-- Çatı uç noktası + top -->
  <rect x="251" y="94" width="10" height="16" rx="4" fill="#D4A840"/>
  <circle cx="256" cy="92" r="7" fill="#F0C040"/>

  <!-- Direk yansıması (su üstünde hafif) -->
  <rect x="246" y="306" width="20" height="52" rx="4" fill="#D4A840" opacity="0.16"/>

</svg>
